<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Studio Pro - 真竖排修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&family=Playfair+Display:wght@400;700&family=Zhi+Mang+Xing&family=Long+Cang&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --panel-width: 380px; --bg-primary: #0b1120; --accent: #3b82f6; }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: var(--bg-primary);
            color: #e2e8f0;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }
        .resizable-panel {
            position: relative;
            width: var(--panel-width);
            min-width: 320px;
            max-width: 500px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.98);
            border-right: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
            flex-shrink: 0;
        }
        .resize-handle {
            position: absolute;
            right: -4px;
            top: 0;
            bottom: 0;
            width: 8px;
            cursor: col-resize;
            z-index: 101;
            transition: background 0.2s;
        }
        .resize-handle:hover { background: rgba(59, 130, 246, 0.3); }
        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .control-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }
        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .text-input, select {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            padding: 8px 12px;
            color: #f8fafc;
            font-size: 13px;
            transition: all 0.2s;
        }
        .text-input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
        }
        textarea.text-input { min-height: 60px; resize: vertical; }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #0f172a;
        }
        .value-display {
            font-size: 11px;
            color: #60a5fa;
            font-family: ui-monospace, monospace;
            min-width: 45px;
            text-align: right;
        }
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch.active { background: var(--accent); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .color-btn {
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.6);
            color: #cbd5e1;
            transition: all 0.2s;
            text-align: center;
        }
        .color-btn:hover { transform: translateY(-1px); border-color: rgba(59, 130, 246, 0.5); }
        .color-btn.active { background: rgba(59, 130, 246, 0.2); border-color: rgba(59, 130, 246, 0.8); color: #60a5fa; }
        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.4);
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.6);
            color: #60a5fa;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            width: 100%;
        }
        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .preview-stage {
            flex: 1;
            position: relative;
            background-color: #0b1120;
            background-image: 
                linear-gradient(45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(-45deg, #1e293b 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #1e293b 75%), 
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            overflow: hidden;
        }
        .preview-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 60px;
            padding: 40px;
            min-width: max-content;
        }
        .canvas-wrapper {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            background: white;
            flex-shrink: 0;
        }
        .floating-toolbar {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(15, 23, 42, 0.95);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            backdrop-filter: blur(10px);
        }
        .tool-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tool-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }
        .test-btn {
            font-size: 11px;
            padding: 6px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .test-btn:hover { background: rgba(59, 130, 246, 0.15); }
        .export-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 20px;
        }
        .color-info {
            font-size: 10px;
            color: #64748b;
            font-family: ui-monospace, monospace;
            padding: 6px 8px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .gradient-meta {
            font-size: 9px;
            color: #475569;
            margin-top: 4px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="resizable-panel" id="leftPanel">
    <div class="resize-handle" id="resizeHandle"></div>
    
    <div class="panel-header">
        <div>
            <h1 class="text-lg font-bold text-white tracking-tight">Cover Studio Pro</h1>
            <p class="text-[10px] text-slate-500">B5 · 真竖排 · 自然科学渐变</p>
        </div>
    </div>
    
    <div class="panel-content">
        <div class="control-section">
            <div class="control-label">测试案例库</div>

            <div>
                <label class="control-label mb-2">作者</label>
                <input type="text" id="authorInput" class="text-input" value="加西亚·马尔克斯">

        <div class="control-section grid-2">
            <div>

                    <option value="Noto Serif SC">思源宋体 SC</option>
                    <option value="Noto Serif TC">思源宋体 TC</option>

                    <option value="Zhi Mang Xing">志莽行书</option>
                    <option value="Ma Shan Zheng">马善政毛笔</option>
                    <option value="Long Cang">龙苍毛笔</option>
                    <option value="Playfair Display">Playfair</option>
                </select>
            </div>
            <div>
                <label class="control-label mb-2">作者字体</label>
                <select id="authorFont">
                    <option value="Noto Sans SC">思源黑体</option>
                    <option value="Noto Serif SC">思源宋体</option>
                    <option value="system-ui">系统字体</option>
                </select>
            </div>
        </div>
        
        <div class="control-section">
            <div class="control-label mb-2">渐变模式</div>
            <div class="mode-toggle">

                    <button class="color-btn" onclick="setPreset('midnight')">午夜</button>

                    <button class="color-btn" onclick="setPreset('glacier')">冰川</button>

                    <button class="color-btn" onclick="setPreset('ochre')">暖赭</button>

                    <button class="color-btn" onclick="setPreset('cream')">米白</button>
                    <button class="color-btn" onclick="setPreset('sky')">天青</button>
                    <button class="color-btn" onclick="setPreset('random')">真随机</button>
                </div>
            </div>
            
            <div class="color-info" id="colorInfo">初始化中...</div>
            <div class="gradient-meta" id="gradientMeta">等待输入...</div>
        </div>
        
        <div class="control-section">
            <div class="mb-3">
                <div class="control-label">
                    <span>视觉面积比</span>
                    <span class="value-display" id="visualRatioVal">65%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="visualRatio" min="30" max="85" value="65" step="1">
                </div>
            </div>
            
            <div class="mb-3">
                <div class="control-label">
                    <span>字间距 (em)</span>
                    <span class="value-display" id="letterSpacingVal">0.05</span>

                    <input type="range" id="letterSpacing" min="0" max="0.5" value="0.05" step="0.01">

                    竖排：列间水平距 | 横排：行间垂直距

        </div>
        
        <div class="control-section">

                <div class="control-label">

            <div class="mb-3">
                <div class="control-label">
                    <span>标题版心宽度</span>
                    <span class="value-display" id="titleWidthVal">70%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="titleWidth" min="50" max="85" value="70" step="1">

            </div>
            
            <div class="mb-3">
                <div class="control-label">
                    <span>标题版心高度</span>
                    <span class="value-display" id="titleHeightVal">80%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="titleHeight" min="50" max="95" value="80" step="1">
                </div>
            </div>
            
            <div class="mb-3">
                <div class="control-label">
                    <span>作者版心宽度</span>
                    <span class="value-display" id="authorWidthVal">60%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="authorWidth" min="40" max="80" value="60" step="1">
                </div>
            </div>
            
            <div class="mb-3">
                <div class="control-label">
                    <span>作者版心高度</span>
                    <span class="value-display" id="authorHeightVal">90%</span>
                </div>
                <div class="slider-container">
                    <input type="range" id="authorHeight" min="50" max="95" value="90" step="1">

        <div class="control-section" style="border-bottom: none;">

    </div>
</div>

<div class="preview-stage" id="previewStage">
    <div class="preview-container" id="previewContainer">
        <div class="canvas-wrapper" id="svgWrapper">
            <svg id="coverSvg" width="528" height="750" viewBox="0 0 176 250" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
                <defs id="svgDefs"></defs>

        <div class="canvas-wrapper" id="canvasWrapper">

    <div class="floating-toolbar">
        <div class="tool-group">
            <button class="tool-btn" onclick="resetView()" title="重置视图">

            </button>

<script>
/**
 * Cover Studio Pro v9.0 - 真竖排修正版
 * 关键修复：
 * 1. CJK竖排严格参数分离：字间距(垂直) vs 列间距(水平，复用行间距)
 * 2. 保留全角标点，不删除原文任何字符
 * 3. 严格模式检测：含[a-z]强制横排，CJK竖排仅接受CJK+全角标点+数字
 * 4. Hash/非Hash双模式，9种预设+全范围科学算法
 */

const CONFIG = {
    width: 176,
    height: 250,
    scale: 3,
    maxVerticalPerCol: 9,
    maxVerticalCols: 3,
    minOrphanUnits: 3,
    maxHorizontalLines: 6,
    maxHorizontalChars: 8,
    maxCJKForVertical: 24,
    get previewW() { return this.width * this.scale; },
    get previewH() { return this.height * this.scale; }
};

const state = {
    title: '',
    author: '',
    visualRatio: 0.65,
    letterSpacing: 0.05,  // CJK竖排：同列字符垂直间距系数 | 横排：水平字间距
    lineSpacingMm: 3,     // CJK竖排：列间水平距(mm) | 横排：行间垂直距(mm)
    bodyRatio: 0.75,
    titleMaxWidth: 0.70,
    titleMaxHeight: 0.80,
    authorMaxWidth: 0.60,
    authorMaxHeight: 0.90,
    sectionGap: 2,
    bleed: 3,
    showGuides: true,
    gradient: null,
    gradientMode: 'hash',      // 'hash' | 'preset'
    hashRange: 'full',         // 'full' | 'warm' | 'cool' | 'mono' | 'highContrast' | 'pastel'
    currentPreset: 'morandi',
    zoom: 1,
    panX: 0,
    panY: 0,
    isDragging: false
};

const TEST_CASES = [
    { label: '单字', title: '道', author: '老子' },
    { label: '双字', title: '围城', author: '钱锺书' },
    { label: '四字', title: '百年孤独', author: '马尔克斯' },
    { label: '带标点', title: '活着，就很好', author: '余华' },  // 测试标点保留
    { label: '英文5词', title: 'All Boys Like Dangerous Animals', author: 'Test' },
    { label: '混排触发横排', title: 'Hello 世界', author: '作者' },  // 应强制横排
    { label: 'CJK+数字', title: '2024太空漫游', author: '阿瑟' },  // 应竖排（数字允许）
    { label: '长竖排', title: '这是一段带有，标点符号的测试文字用于', author: '测试' },
    { label: '超长横排', title: '这是一段测试文字用于检查横排版式效果这是一段测试文字用于检查横排版式效果', author: '测试' },
    { label: '英文6词', title: 'Design Patterns Elements', author: 'GoF' },
    { label: '小写触发横排', title: 'abc中文', author: '测试' }  // 含小写，强制横排
];

// ==================== 自然科学算法库 ====================

function djb2(str) {
    let hash = 5381;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash) + str.charCodeAt(i);
    }
    return hash >>> 0;
}

function mulberry32(seed) {
    return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function goldenRatioHue(baseHue, index, total) {
    const GOLDEN_ANGLE = 137.5077640500378;
    return (baseHue + index * GOLDEN_ANGLE) % 360;
}

// 解析HSL字符串
function parseHSL(hslStr) {
    const match = hslStr.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
    if (!match) return { h: 0, s: 0, l: 50 };
    return {
        h: parseInt(match[1]),
        s: parseInt(match[2]),
        l: parseInt(match[3])
    };
}

// 计算相对亮度 (WCAG标准)
function getLuminance(hsl) {
    // 简化版：直接拿Lightness作为参考，实际应转RGB计算
    // 这里我们基于HSV的Value更准确
    const s = hsl.s / 100;
    const l = hsl.l / 100;
    const v = l + s * Math.min(l, 1 - l);
    return v;
}

// 判断是否应该用深色文字 (背景够亮)
function shouldUseDarkText(stops) {
    // 计算渐变平均亮度
    const avgLightness = stops.reduce((sum, stop) => {
        const hsl = parseHSL(stop.color);
        return sum + hsl.l;
    }, 0) / stops.length;
    
    // 如果平均亮度 > 55%，用深色文字；否则浅色
    return avgLightness > 55;
}
