<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure TTS 音色测试 - 流萤阅读器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .slider-value {
            min-width: 50px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        
        .voice-tag {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 8px;
        }
        
        .voice-tag.kid {
            background: #fff3e0;
            color: #f57c00;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .help-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85em;
        }
        
        .help-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .help-link a:hover {
            text-decoration: underline;
        }
        
        .preset-texts {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .preset-btn {
            padding: 5px 12px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .preset-btn:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Azure TTS 音色测试</h1>
        <p class="subtitle">试听云希（小男孩）等微软神经网络语音</p>
        
        <div class="form-group">
            <label>Azure 语音服务密钥 (Speech Key)</label>
            <input type="password" id="apiKey" placeholder="输入你的 Azure Speech Key">
            <small style="color: #999; display: block; margin-top: 5px;">在 Azure 门户的"语音服务"中获取，每月有免费额度</small>
        </div>
        
        <div class="form-group">
            <label>服务区域 (Region)</label>
            <select id="region">
                <option value="eastasia">东亚 (East Asia) - 香港</option>
                <option value="southeastasia">东南亚 (Southeast Asia) - 新加坡</option>
                <option value="chinaeast2">中国东部2</option>
                <option value="chinanorth2">中国北部2</option>
                <option value="japaneast">日本东部</option>
                <option value="koreacentral">韩国中部</option>
                <option value="westus">美国西部</option>
                <option value="eastus">美国东部</option>
                <option value="westeurope">西欧</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>选择音色 <span class="voice-tag kid">推荐</span></label>
            <select id="voice">
                <optgroup label="👦 小男孩音色">
                    <option value="zh-CN-YunxiNeural">云希 (Yunxi) - 年轻男声，活泼</option>
                    <option value="zh-CN-YunjianNeural">云健 (Yunjian) - 年轻男声，沉稳</option>
                </optgroup>
                <optgroup label="👧 小女孩音色">
                    <option value="zh-CN-XiaoxiaoNeural">晓晓 (Xiaoxiao) - 女声，甜美</option>
                    <option value="zh-CN-XiaoyiNeural">晓伊 (Xiaoyi) - 女声，温柔</option>
                </optgroup>
                <optgroup label="👨 成年男声">
                    <option value="zh-CN-YunyangNeural">云扬 (Yunyang) - 专业男声</option>
                </optgroup>
                <optgroup label="👩 成年女声">
                    <option value="zh-CN-XiaochenNeural">晓晨 (Xiaochen) - 女声，成熟</option>
                </optgroup>
            </select>
        </div>
        
        <div class="form-group">
            <label>音调调整 (Pitch) - 让声音更童稚</label>
            <div class="slider-group">
                <input type="range" id="pitch" min="-50" max="50" value="15">
                <span class="slider-value" id="pitchValue">+15%</span>
            </div>
            <small style="color: #999;">正值声音更尖（像小孩），负值更低沉</small>
        </div>
        
        <div class="form-group">
            <label>语速 (Rate)</label>
            <div class="slider-group">
                <input type="range" id="rate" min="-50" max="50" value="10">
                <span class="slider-value" id="rateValue">+10%</span>
            </div>
        </div>
        
        <div class="form-group">
            <label>测试文本</label>
            <div class="preset-texts">
                <button type="button" class="preset-btn" onclick="setText('你好呀，我是云希，是你的小助手！')">问候</button>
                <button type="button" class="preset-btn" onclick="setText('今天天气真好，我想去公园玩。')">日常</button>
                <button type="button" class="preset-btn" onclick="setText('流萤阅读器，为阅读而生，因私密而美。')">阅读器</button>
                <button type="button" class="preset-btn" onclick="setText('第一章 初见')">章节</button>
            </div>
            <textarea id="text" placeholder="输入要朗读的文本...">你好呀，我是云希，是你的小助手！今天想读什么书呢？</textarea>
        </div>
        
        <button id="speakBtn" onclick="speak()">▶ 播放试听</button>
        
        <div id="status" class="status" style="display: none;"></div>
        
        <div class="help-link">
            <a href="https://azure.microsoft.com/zh-cn/services/cognitive-services/text-to-speech/" target="_blank">🔗 获取 Azure 语音服务</a>
            |
            <a href="https://speech.microsoft.com/portal/voicegallery" target="_blank">🎵 官方音色库</a>
        </div>
    </div>

    <script>
        // 滑块数值显示
        document.getElementById('pitch').addEventListener('input', function() {
            const val = this.value;
            document.getElementById('pitchValue').textContent = (val > 0 ? '+' : '') + val + '%';
        });
        
        document.getElementById('rate').addEventListener('input', function() {
            const val = this.value;
            document.getElementById('rateValue').textContent = (val > 0 ? '+' : '') + val + '%';
        });
        
        // 预设文本
        function setText(text) {
            document.getElementById('text').value = text;
        }
        
        // 显示状态
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }
        
        // 隐藏状态
        function hideStatus() {
            document.getElementById('status').style.display = 'none';
        }
        
        async function speak() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const region = document.getElementById('region').value;
            const voice = document.getElementById('voice').value;
            const text = document.getElementById('text').value.trim();
            const pitch = document.getElementById('pitch').value;
            const rate = document.getElementById('rate').value;
            const btn = document.getElementById('speakBtn');
            
            if (!apiKey) {
                showStatus('请输入 Azure Speech Key', 'error');
                return;
            }
            if (!text) {
                showStatus('请输入要朗读的文本', 'error');
                return;
            }
            
            btn.disabled = true;
            showStatus('正在生成语音...', 'loading');
            
            try {
                // 构建 SSML
                const pitchValue = pitch >= 0 ? `+${pitch}%` : `${pitch}%`;
                const rateValue = rate >= 0 ? `+${rate}%` : `${rate}%`;
                
                const ssml = `<?xml version="1.0" encoding="UTF-8"?>
<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="zh-CN">
    <voice name="${voice}">
        <prosody pitch="${pitchValue}" rate="${rateValue}">${escapeXml(text)}</prosody>
    </voice>
</speak>`;
                
                // 调用 Azure TTS API
                const response = await fetch(`https://${region}.tts.speech.microsoft.com/cognitiveservices/v1`, {
                    method: 'POST',
                    headers: {
                        'Ocp-Apim-Subscription-Key': apiKey,
                        'Content-Type': 'application/ssml+xml',
                        'X-Microsoft-OutputFormat': 'audio-16khz-128kbitrate-mono-mp3',
                        'User-Agent': 'LuminaReader'
                    },
                    body: ssml
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API 错误: ${response.status} - ${errorText}`);
                }
                
                // 播放音频
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);
                
                audio.onended = () => {
                    URL.revokeObjectURL(audioUrl);
                    btn.disabled = false;
                    hideStatus();
                };
                
                audio.onerror = () => {
                    throw new Error('音频播放失败');
                };
                
                await audio.play();
                showStatus('正在播放...', 'success');
                
            } catch (error) {
                console.error(error);
                showStatus('错误: ' + error.message, 'error');
                btn.disabled = false;
            }
        }
        
        function escapeXml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }
    </script>
</body>
</html>
