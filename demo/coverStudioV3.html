                if(i < towers || towers === 1) {
                    const cables = Math.floor(3 + p[i%40]*5 * density);
                    const startX = towers === 1 ? 0 : prevX;
                    const endX = towers === 1 ? w : x;
                    
                    for(let c=1; c<cables; c++) {
                        const cx = startX + (endX-startX)*(c/cables);
                        const cableY = deckY - towerH*0.6; // 简化计算
                        ctx.globalAlpha = 0.2;
                        ctx.lineWidth = 0.8;
                        ctx.beginPath();
                        ctx.moveTo(cx, deckY);
                        ctx.lineTo(cx, cableY);
                        ctx.stroke();
                    }
                }
            }
            
            // 桥面
            ctx.globalAlpha = 0.6;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, deckY);
            ctx.lineTo(w, deckY);
            ctx.stroke();
        },

        sandDune(ctx, w, h, p, density) {
            const ridges = Math.floor(8 + p[0] * 8 * density);
            
            for(let i=0; i<ridges; i++) {
                const y = h * (0.3 + i/ridges*0.6);
                const amplitude = 15 + p[i%40] * 25;
                const freq = 0.02 + p[(i+5)%40] * 0.03;
                
                ctx.globalAlpha = 0.25;
                ctx.lineWidth = 1 + (1-i/ridges)*2;
                ctx.beginPath();
                
                for(let x=0; x<=w; x+=3) {
                    const wave = Math.sin(x*freq + i)*amplitude 
                            + Math.sin(x*freq*2.5)*amplitude*0.3;
                    const py = y + wave;
                    if(x===0) ctx.moveTo(x, py);
                    else ctx.lineTo(x, py);
                }
                ctx.stroke();
                
                // 阴影填充（沙丘背光面）
                ctx.globalAlpha = 0.08;
                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.closePath();
                ctx.fill();
            }
        },

        knots(ctx, w, h, p, density) {
            const cx = w/2, cy = h/2;
            const strands = Math.floor(3 + p[0] * 4); // 绳股数
            const crossings = Math.floor((8 + p[1] * 12) * density);
            const radius = Math.min(w, h) * 0.35;
            
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 生成交叉序列（上/下编织模式）
            const pattern = [];
            for (let i = 0; i < crossings; i++) {
                pattern.push({
                    over: p[i%40] > 0.5,
                    angle: (Math.PI * 2 * i) / crossings + p[(i+10)%40] * 0.2,
                    offset: (p[(i+20)%40] - 0.5) * radius * 0.3
                });
            }
            
            // 绘制每根绳股
            for (let s = 0; s < strands; s++) {
                const phase = (Math.PI * 2 * s) / strands;
                const path = [];
                
                for (let i = 0; i <= crossings; i++) {
                    const pt = pattern[i % crossings];
                    const a = pt.angle + phase;
                    const r = radius + pt.offset * Math.sin(s * 2 + i);
                    
                    path.push({
                        x: cx + Math.cos(a) * r,
                        y: cy + Math.sin(a) * r,
                        over: pt.over // 记录此处是否为"上跨"
                    });
                }
                
                // 绘制带间隙的绳（模拟上下穿插）
                for (let i = 0; i < path.length - 1; i++) {
                    const current = path[i];
                    const next = path[i + 1];
                    
                    // 如果在交叉点，根据over/under决定颜色/间隙
                    if (current.over) {
                        ctx.globalAlpha = 0.9; // 上跨：实线
                        ctx.strokeStyle = ctx.strokeStyle;
                    } else {
                        ctx.globalAlpha = 0.3; // 下跨：虚线/淡线
                    }
                    
                    ctx.beginPath();
                    ctx.moveTo(current.x, current.y);
                    ctx.lineTo(next.x, next.y);
                    ctx.stroke();
                    
                    // 在交叉点画小圆（编织结点）
                    if (i < path.length - 2) {
                        ctx.globalAlpha = 0.6;
                        ctx.fillStyle = ctx.strokeStyle;
                        ctx.beginPath();
                        ctx.arc(next.x, next.y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            // 装饰性外环
            ctx.globalAlpha = 0.4;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 1.15, 0, Math.PI * 2);
            ctx.stroke();
        },

        fractalTree(ctx, w, h, p, density) {
            const startX = w/2;
            const startY = h;
            const initialLength = h * 0.25;
            const angle = -Math.PI/2; // 向上
            
            const drawBranch = (x, y, len, ang, depth, maxDepth) => {
                if (depth > maxDepth || len < 2) return;
                
                const endX = x + Math.cos(ang) * len;
                const endY = y + Math.sin(ang) * len;
                
                // 线条粗细随深度递减
                ctx.lineWidth = Math.max(0.5, (maxDepth - depth) * 0.8);
                ctx.globalAlpha = 0.4 + (depth/maxDepth) * 0.4;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);
                ctx.stroke();
                
                // 递归分支
                const nBranches = Math.floor(2 + p[depth % 40] * 2); // 2-3分支
                for (let i = 0; i < nBranches; i++) {
                    const offset = (i - (nBranches-1)/2) * 0.6; // 扇形分布
                    const newAngle = ang + offset + (p[(depth*3+i)%40] - 0.5) * 0.4;
                    const newLength = len * (0.6 + p[(depth*2+i)%40] * 0.2);
                    
                    drawBranch(endX, endY, newLength, newAngle, depth+1, maxDepth);
                }
                
                // 叶子（末端）
                if (depth === maxDepth || len < 10) {
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.arc(endX, endY, 2 + p[depth%40]*2, 0, Math.PI*2);
                    ctx.fill();
                }
            };
            
            const maxDepth = Math.floor(6 + p[0] * 4 * density);
            drawBranch(startX, startY, initialLength, angle, 0, maxDepth);
        },

        koch(ctx, w, h, p, density) {
            const iterations = Math.floor((2 + p[0] * 3) * density);
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) * 0.4;
            
            const kochLine = (x1, y1, x2, y2, n) => {
                if (n === 0) {
                    ctx.lineTo(x2, y2);
                    return;
                }
                const dx = (x2 - x1) / 3;
                const dy = (y2 - y1) / 3;
                const xA = x1 + dx;
                const yA = y1 + dy;
                const xB = x1 + 2*dx;
                const yB = y1 + 2*dy;
                
                const angle = Math.atan2(dy, dx) - Math.PI/3;
                const len = Math.sqrt(dx*dx + dy*dy);
                const xC = xA + len * Math.cos(angle);
                const yC = yA + len * Math.sin(angle);
                
                kochLine(x1, y1, xA, yA, n-1);
                kochLine(xA, yA, xC, yC, n-1);
                kochLine(xC, yC, xB, yB, n-1);
                kochLine(xB, yB, x2, y2, n-1);
            };
            
            ctx.globalAlpha = 0.25;
            ctx.lineWidth = 1.2;
            
            for (let i = 0; i < 3; i++) {
                const angle = (Math.PI * 2 * i) / 3 - Math.PI/2;
                const nextAngle = (Math.PI * 2 * (i+1)) / 3 - Math.PI/2;
                const x1 = centerX + radius * Math.cos(angle);
                const y1 = centerY + radius * Math.sin(angle);
                const x2 = centerX + radius * Math.cos(nextAngle);
                const y2 = centerY + radius * Math.sin(nextAngle);
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                kochLine(x1, y1, x2, y2, iterations);
                ctx.stroke();
            }
        },

        interference(ctx, w, h, p, density) {
            const sources = Math.floor((2 + p[0] * 3) * density);
            const wavelength = 8 + p[1] * 12;
            const amplitude = 1;
            
            const centers = [];
            for (let i = 0; i < sources; i++) {
                centers.push({
                    x: p[i*2 % 40] * w,
                    y: p[(i*2+1) % 40] * h
                });
            }
            
            ctx.lineWidth = 0.8;
            
            for (let x = 0; x < w; x += 2) {
                for (let y = 0; y < h; y += 2) {
                    let intensity = 0;
                    centers.forEach(center => {
                        const dist = Math.hypot(x - center.x, y - center.y);
                        intensity += Math.sin(dist / wavelength * Math.PI * 2) * amplitude;
                    });
                    
                    const alpha = (intensity + sources) / (2 * sources);
                    if (alpha > 0.6) {
                        ctx.globalAlpha = (alpha - 0.6) * 0.8;
                        ctx.fillRect(x, y, 2, 2);
                    }
                }
            }
        },

        vine(ctx, w, h, p, density) {
            const stems = Math.floor((3 + p[0] * 4) * density);
            const segments = 12;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            for (let s = 0; s < stems; s++) {
                let x = p[s*5 % 40] * w;
                let y = h;
                let angle = -Math.PI/2 + (p[(s*5+1)%40] - 0.5) * 0.5;
                let width = 3;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                
                for (let i = 0; i < segments; i++) {
                    angle += (p[(s*5+i*2)%40] - 0.5) * 0.4;
                    const len = 15 + p[(s*5+i*2+1)%40] * 20;
                    x += Math.cos(angle) * len;
                    y += Math.sin(angle) * len;
                    
                    ctx.lineWidth = width * (1 - i/segments);
                    ctx.globalAlpha = 0.3 - (i/segments) * 0.2;
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    
                    // 重新开始下一段枝干路径
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    
                    // 绘制叶片
                    if (i > 2 && p[(s*5+i)%40] > 0.7) {
                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(angle);
                        ctx.globalAlpha = 0.25;
                        ctx.beginPath();
                        ctx.ellipse(0, -5, 4, 8, 0, 0, Math.PI*2);
                        ctx.fill();
                        ctx.restore();
                        
                        // 关键修复：fill() 后路径仍包含椭圆数据，必须清空并重新定位画笔
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                    }
                }
            }

        digitalRain(ctx, w, h, p, density) {
            const columns = Math.floor((15 + p[0] * 25) * density);
            const colWidth = w / columns;
            
            // 多组字符集，每列随机选择
            const charSets = [
                '0123456789LUMINAREADER',
                '01',
                'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン',
                'αβγδεζηθικλμνξοπρστυφχψω∑∆∞∂∫√',
                '☰☱☲☳☴☵☶☷'
            ];
            
            ctx.textBaseline = 'top';
            
            // 增强型伪随机：基于p数组产生更分散的随机数
            const prng = (seed) => {
                const idx1 = Math.floor(Math.abs(Math.sin(seed * 12.9898) * 43758.5453) % 40);
                const idx2 = Math.floor(Math.abs(Math.cos(seed * 78.233) * 43758.5453) % 40);
                return (p[idx1] + p[idx2]) % 1.0; // 混合两个p值增加随机性
            };
            
            for (let i = 0; i < columns; i++) {
                // 每列独立的种子和参数
                const colSeed = i * 137 + (p[i % 40] * 1000);
                const dropLength = Math.floor(4 + prng(colSeed) * 15 * density);
                const startY = prng(colSeed + 1) * h;
                const speed = 0.6 + prng(colSeed + 2) * 1.2; // 每列速度不同
                const charSet = charSets[Math.floor(prng(colSeed + 3) * charSets.length)];
                const x = i * colWidth + colWidth * 0.05;
                
                ctx.font = `${colWidth * 0.75}px monospace`;
                
                // 绘制下落链条
                for (let j = 0; j < dropLength; j++) {
                    const y = startY + j * colWidth * speed;
                    if (y > h || y < -colWidth) continue;
                    
                    // 随机字符选择：基于列种子+位置+时间因子，确保不重复
                    const charIdx = Math.floor(prng(colSeed + j * 53.7) * charSet.length);
                    const char = charSet[charIdx];
                    
                    // 头部高亮（经典矩阵效果）
                    if (j === 0) {
                        ctx.globalAlpha = 1.0;
                        ctx.font = `bold ${colWidth * 0.9}px monospace`;
                        ctx.fillText(char, x, y);
                        // 光晕层
                        ctx.globalAlpha = 0.4;
                        ctx.fillText(char, x, y);
                    } else {
                        // 拖尾渐隐 + 随机闪烁
                        const fadeAlpha = (1 - j / dropLength) * 0.5;
                        const flash = prng(colSeed + j * 7.3) > 0.85 ? 0.3 : 0; // 随机闪烁
                        ctx.globalAlpha = fadeAlpha + flash;
                        ctx.font = `${colWidth * 0.75}px monospace`;
                        ctx.fillText(char, x, y);
                    }
                }
            }
        },

        lattice(ctx, w, h, p, density) {
            const cols = Math.floor((4 + p[0] * 4) * density);
            const rows = Math.floor((6 + p[1] * 4) * density);
            const cellW = w / cols;
            const cellH = h / rows;
            const r = Math.min(cellW, cellH) * 0.15;
            
            ctx.lineWidth = 2;
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * cellW;
                    const y = j * cellH;
                    const cx = x + cellW/2;
                    const cy = y + cellH/2;
                    
                    ctx.globalAlpha = 0.35;
                    ctx.strokeRect(x+2, y+2, cellW-4, cellH-4);
                    
                    // 内部花纹
                    const pattern = (i + j) % 4;
                    ctx.beginPath();
                    
                    if (pattern === 0) {
                        // 十字
                        ctx.moveTo(cx, y+5); ctx.lineTo(cx, y+cellH-5);
                        ctx.moveTo(x+5, cy); ctx.lineTo(x+cellW-5, cy);
                    } else if (pattern === 1) {
                        // 菱形
                        ctx.moveTo(cx, y+8); ctx.lineTo(x+cellW-8, cy);
                        ctx.lineTo(cx, y+cellH-8); ctx.lineTo(x+8, cy);
                        ctx.closePath();
                    } else if (pattern === 2) {
                        // 圆
                        ctx.arc(cx, cy, r, 0, Math.PI*2);
                    } else {
                        // 对角线
                        ctx.moveTo(x+5, y+5); ctx.lineTo(x+cellW-5, y+cellH-5);
                        ctx.moveTo(x+cellW-5, y+5); ctx.lineTo(x+5, y+cellH-5);
                    }
                    ctx.stroke();
                }
            }
        },

        hypercube(ctx, w, h, p, density) {
            const cx = w/2, cy = h/2;
            const size = Math.min(w, h) * 0.25;
            const angle = p[0] * Math.PI / 4;
            
            // 3D立方体顶点
            const cube = [];
            for (let i = 0; i < 8; i++) {
                const x = (i & 1) ? size : -size;
                const y = (i & 2) ? size : -size;
                const z = (i & 4) ? size : -size;
                
                // 旋转投影
                const x1 = x * Math.cos(angle) - z * Math.sin(angle);
                const z1 = x * Math.sin(angle) + z * Math.cos(angle);
                const y1 = y * Math.cos(angle*0.7) - z1 * Math.sin(angle*0.7);
                
                cube.push({
                    x: cx + x1 * (1 + 0.3 * Math.sin(angle)),
                    y: cy + y1 * (1 + 0.3 * Math.sin(angle))
                });
            }
            
            // 边连接关系
            const edges = [
                [0,1], [0,2], [0,4], [1,3], [1,5], [2,3], [2,6],
                [3,7], [4,5], [4,6], [5,7], [6,7]
            ];
            
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 1.5;
            
            // 内层立方体（较小）
            const innerCube = cube.map(v => ({
                x: cx + (v.x - cx) * 0.6,
                y: cy + (v.y - cy) * 0.6
            }));
            
            // 绘制连接线
            edges.forEach(([a, b]) => {
                ctx.beginPath();
                ctx.moveTo(cube[a].x, cube[a].y);
                ctx.lineTo(cube[b].x, cube[b].y);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(innerCube[a].x, innerCube[a].y);
                ctx.lineTo(innerCube[b].x, innerCube[b].y);
                ctx.stroke();
                
                // 内外连接
                ctx.globalAlpha = 0.15;
                ctx.beginPath();
                ctx.moveTo(cube[a].x, cube[a].y);
                ctx.lineTo(innerCube[a].x, innerCube[a].y);
                ctx.stroke();
                ctx.globalAlpha = 0.3;
            });
        },

        spermatozoa(ctx, w, h, p, density) {
            const count = Math.floor((15 + p[0] * 25) * density);
            
            // 为每个细胞独立提取参数，突破40个限制
            const getCellParams = (idx) => {
                // 使用 djb2 风格的散列为每个细胞生成独立种子
                let hash = 5381 + idx * 997;
                const params = [];
                for (let i = 0; i < 8; i++) {
                    hash = ((hash << 5) + hash) + (i * 137);
                    params.push((Math.abs(hash) % 1000) / 1000);
                }
                return params;
            };
            
            // 生物学参数
            const headLengthBase = 6 + p[1] * 5;
            const tailLengthBase = 20 + p[2] * 30;
            const waveAmpBase = 2 + p[3] * 3;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 分层随机：将画布分为网格，每个网格内随机放置，确保均匀
            const cols = Math.ceil(Math.sqrt(count * w / h));
            const rows = Math.ceil(count / cols);
            const cellW = w / cols;
            const cellH = h / rows;
            
            for (let i = 0; i < count; i++) {
                const cp = getCellParams(i);
                
                // 计算网格位置 + 内部随机扰动（避免边缘聚集）
                const gridX = (i % cols) * cellW;
                const gridY = Math.floor(i / cols) * cellH;
                
                // 在网格内随机，保留边距避免贴边
                const marginX = cellW * 0.15;
                const marginY = cellH * 0.15;
                const x = gridX + marginX + cp[0] * (cellW - marginX * 2);
                const y = gridY + marginY + cp[1] * (cellH - marginY * 2);
                
                // 独立随机属性
                const angle = cp[2] * Math.PI * 2;
                const scale = 0.5 + cp[3] * 0.9;
                const phase = cp[4] * Math.PI * 2;
                const headLength = headLengthBase * (0.8 + cp[5] * 0.4);
                const headWidth = headLength * (0.5 + cp[6] * 0.2);
                const tailLength = tailLengthBase * (0.7 + cp[7] * 0.6);
                const waveAmp = waveAmpBase * scale;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.scale(scale, scale);
                
                // 绘制头部（流线型）
                ctx.globalAlpha = 0.35 + cp[5] * 0.25;
                ctx.fillStyle = ctx.strokeStyle;
                
                ctx.beginPath();
                ctx.ellipse(headLength * 0.3, 0, headLength * 0.5, headWidth * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 内部高光
                ctx.globalAlpha = 0.2;
                ctx.beginPath();
                ctx.ellipse(headLength * 0.15, -headWidth * 0.15, headLength * 0.15, headWidth * 0.2, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制尾部（波浪形鞭毛）
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 1;
                ctx.beginPath();
                
                const startX = headLength * 0.7;
                ctx.moveTo(startX, 0);
                
                const segments = 20;
                for (let t = 1; t <= segments; t++) {
                    const progress = t / segments;
                    const tx = startX + progress * tailLength;
                    const decay = 1 - progress * 0.4;
                    const ty = Math.sin(progress * Math.PI * 4 + phase) * waveAmp * decay;
                    
                    if (t === 1) {
                        ctx.lineTo(tx, ty);
                    } else {
                        ctx.lineTo(tx, ty);
                    }
                }
                ctx.stroke();
                
                // 运动轨迹（部分细胞）
                if (cp[3] > 0.6) {
                    ctx.globalAlpha = 0.1;
                    ctx.setLineDash([3, 5]);
                    ctx.lineWidth = 0.6;
                    ctx.beginPath();
                    ctx.moveTo(-tailLength * 0.3, 0);
                    ctx.lineTo(-tailLength * 0.6, 0);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                
                ctx.restore();
            }
        },

        genitalTile(ctx, w, h, p, density) {
    const basePath = "M 50 1.454803 C 67.40441 1.454803 70.44456 27.49646 64.06787 29.31016 L 62.98149 29.23087 L 62.98149 65.74032 L 64.25693 65.57968 C 73.36016 65.57968 80.73969 72.95921 80.73969 82.06236 C 80.73969 91.16559 73.36016 98.54512 64.25693 98.54512 C 58.56748 98.54512 53.55126 95.66252 50.58921 91.27803 L 50 90.19244 L 49.41071 91.27803 C 46.44866 95.66252 41.43244 98.54512 35.74299 98.54512 C 26.63976 98.54512 19.26024 91.16559 19.26024 82.06236 C 19.26024 72.95921 26.63976 65.57968 35.74299 65.57968 L 37.01851 65.74032 L 37.01851 29.23087 L 35.93213 29.31016 C 29.55536 27.49646 32.59551 1.454803 50 1.454803 Z";
    
    const prng = (seed) => {
        let h = 5381 + seed * 997;
        h = ((h << 5) + h) + (seed * 137);

    const contentH = 97.09;  // 98.54 - 1.45
    // 旋转 45° 时的最大边界（|w*cos|+|h*sin|）
    const maxRotatedWidth = (contentW + contentH) / Math.sqrt(2); // ≈ 112.1
    // 安全缩放：确保任意角度旋转都不溢出，保留 15% 边距
    const minCellSize = Math.min(cellW, cellH);
    const fixedScale = (minCellSize * 0.85) / maxRotatedWidth;

        const cx = col * cellW + cellW / 2;

            const transform = `translate(${cx.toFixed(2)}, ${cy.toFixed(2)}) rotate(${rotDeg}) scale(${fixedScale.toFixed(4)}) translate(-50, -50)`;
