                    const noise = Math.sin(x * 0.03) * Math.cos(y * 0.03) * Math.sin((x+y) * 0.01);
                    ctx.globalAlpha = Math.abs(noise) * 0.15 * density;
                    ctx.fillRect(x, y, step, step);
                }
            }
        },

        stringArt(ctx, w, h, p, density) {
            const pins = Math.floor((24 + p[0] * 8) * density);  // 增加：原来固定20，现在24-32个锚点
            const cx = w/2, cy = h/2;
            const r = Math.min(w, h) * 0.42;  // 稍微扩大半径
            
            for (let i = 0; i < pins; i++) {
                for (let j = i + 1; j < pins; j += 2) {
                    const angle1 = (i / pins) * Math.PI * 2;
                    const angle2 = (j / pins) * Math.PI * 2;
                    
                    ctx.globalAlpha = 0.28;  // 提高透明度：0.15 → 0.28
                    ctx.lineWidth = 0.8;     // 加粗线条：0.5 → 0.8
                    
                    ctx.beginPath();
                    ctx.moveTo(cx + r * Math.cos(angle1), cy + r * Math.sin(angle1));
                    ctx.lineTo(cx + r * Math.cos(angle2), cy + r * Math.sin(angle2));
                    ctx.stroke();
                }
            }
        },

        isometric(ctx, w, h, p, density) {
            const size = 30 / density;
            ctx.lineWidth = 0.8;
            for (let y = -h; y < h * 2; y += size * 0.866) {
                for (let x = -w; x < w * 2; x += size) {
                    const offset = (Math.floor(y / (size * 0.866)) % 2) * (size / 2);
                    ctx.globalAlpha = 0.2;
                    ctx.beginPath();
                    ctx.moveTo(x + offset, y);
                    ctx.lineTo(x + offset + size/2, y - size * 0.433);
                    ctx.lineTo(x + offset + size, y);
                    ctx.lineTo(x + offset + size/2, y + size * 0.433);
                    ctx.closePath();
                    ctx.stroke();
                }
            }
        },

        turing(ctx, w, h, p, density) {
            const spots = Math.floor((15 + p[0] * 25) * density);
            for (let i = 0; i < spots; i++) {
                const cx = p[i % 40] * w;
                const cy = p[(i + 10) % 40] * h;
                const r = 10 + p[(i + 20) % 40] * 40;
                
                ctx.globalAlpha = 0.3;
                ctx.beginPath();
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    const noise = Math.sin(angle * 3 + i) * Math.cos(angle * 5) * 3;
                    const x = cx + (r + noise) * Math.cos(angle);
                    const y = cy + (r + noise) * Math.sin(angle);
                    if (angle === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.globalAlpha = 0.15;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
                ctx.stroke();
            }
        },

        dendrite(ctx, w, h, p, density) {
            const centers = Math.floor((2 + p[0] * 3) * density);
            
            for (let c = 0; c < centers; c++) {
                const cx = (0.2 + p[c*4] * 0.6) * w;
                const cy = (0.2 + p[(c*4+1)%40] * 0.6) * h;
                const branches = 6 + Math.floor(p[(c*4+2)%40] * 6);
                
                for (let i = 0; i < branches; i++) {
                    const angle = (Math.PI * 2 * i) / branches + p[(c*4+3)%40];
                    let x = cx, y = cy;
                    let len = 20 + p[i%40] * 60;
                    
                    ctx.globalAlpha = 0.4;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    
                    for (let gen = 0; gen < 4; gen++) {
                        const subBranches = gen < 2 ? 2 : 1;
                        for (let sb = 0; sb < subBranches; sb++) {
                            const subAngle = angle + (sb - 0.5) * 0.4 * (gen + 1);
                            const subLen = len * Math.pow(0.6, gen);
                            const ex = x + Math.cos(subAngle) * subLen;
                            const ey = y + Math.sin(subAngle) * subLen;
                            ctx.lineTo(ex, ey);
                            ctx.moveTo(ex, ey);
                        }
                    }
                    ctx.stroke();
                }
            }
        },

        droste(ctx, w, h, p, density) {
            let size = Math.min(w, h) * 0.9;
            let x = (w - size) / 2;
            let y = (h - size) / 2;
            const count = Math.floor((8 + p[0] * 12) * density);
            const rotStep = (p[1] - 0.5) * 0.1;
            
            ctx.save();
            ctx.translate(w/2, h/2);
            
            for (let i = 0; i < count; i++) {
                const scale = Math.pow(0.85, i);
                const rotation = i * rotStep;
                
                ctx.save();
                ctx.scale(scale, scale);
                ctx.rotate(rotation);
                
                ctx.globalAlpha = 0.25 - (i / count) * 0.15;
                ctx.lineWidth = 2 / scale;
                ctx.strokeRect(-size/2, -size/2, size, size);
                
                if (i % 2 === 0) {
                    ctx.globalAlpha = 0.1;
                    ctx.beginPath();
                    ctx.moveTo(-size/2, 0);
                    ctx.lineTo(size/2, 0);
                    ctx.moveTo(0, -size/2);
                    ctx.lineTo(0, size/2);
                    ctx.stroke();
                }
                
                ctx.restore();
            }
            
            ctx.restore();
        },

        inkBleed(ctx, w, h, p, density) {
            const drops = Math.floor((3 + p[0] * 5) * density);
            
            for (let i = 0; i < drops; i++) {
                const cx = p[i*5] * w;
                const cy = p[(i*5+1)%40] * h;
                const maxR = 50 + p[(i*5+2)%40] * 100;
                
                for (let r = maxR; r > 0; r -= 3) {
                    const alpha = 0.05 * (r / maxR);
                    ctx.globalAlpha = alpha;
                    
                    ctx.beginPath();
                    for (let angle = 0; angle <= Math.PI * 2; angle += 0.2) {
                        const irregular = Math.sin(angle * 4 + i) * 2 + Math.cos(angle * 7) * 1.5;
                        const x = cx + (r + irregular) * Math.cos(angle);
                        const y = cy + (r + irregular) * Math.sin(angle);
                        if (angle === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
                
                ctx.globalAlpha = 0.6;
                ctx.beginPath();
                ctx.arc(cx, cy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        },

        snowflake(ctx, w, h, p, density) {
            const cx = w / 2, cy = h / 2;
            const maxRadius = Math.min(w, h) * 0.4;
            const arms = 6;
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            for (let arm = 0; arm < arms; arm++) {
                const baseAngle = (arm * Math.PI * 2) / 6;
                
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(baseAngle);
                
                const mainLen = maxRadius * (0.6 + p[arm % 40] * 0.3);
                const branches = Math.floor((3 + p[(arm + 5) % 40] * 3) * density);
                
                ctx.globalAlpha = 0.8;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(0, -mainLen);
                ctx.stroke();
                
                for (let i = 1; i <= branches; i++) {
                    const pos = (i / (branches + 1)) * mainLen;
                    const branchLen = mainLen * 0.4 * (1 - i / (branches + 1));
                    
                    for (let side of [-1, 1]) {
                        ctx.save();
                        ctx.translate(0, -pos);
                        ctx.rotate(side * (Math.PI / 4 + p[(arm + i) % 40] * 0.2));
                        
                        ctx.globalAlpha = 0.6 - (i / branches) * 0.3;
                        ctx.lineWidth = 1.5 - (i / branches) * 0.8;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(0, -branchLen);
                        ctx.stroke();
                        
                        if (i < branches && p[(arm + i * 2) % 40] > 0.3) {
                            ctx.translate(0, -branchLen * 0.6);
                            ctx.rotate(side * Math.PI / 6);
                            ctx.globalAlpha = 0.4;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(0, -branchLen * 0.3);
                            ctx.stroke();
                        }
                        
                        ctx.restore();
                    }
                }
                
                ctx.translate(0, -mainLen);
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = 1;
                for (let k = 0; k < 6; k++) {
                    ctx.save();
                    ctx.rotate((k * Math.PI * 2) / 6);
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, -8);
                    ctx.stroke();
                    ctx.restore();
                }
                
                ctx.restore();
            }
            
            ctx.globalAlpha = 0.9;
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (i * Math.PI * 2) / 6;
                const r = 12;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
            
            ctx.globalAlpha = 0.08;
            ctx.lineWidth = 0.5;
            for (let ring = 1; ring <= 3; ring++) {
                ctx.beginPath();
                const r = maxRadius * 0.3 * ring;
                for (let i = 0; i <= 6; i++) {
                    const angle = (i * Math.PI * 2) / 6;
                    const x = cx + r * Math.cos(angle);
                    const y = cy + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
        }
    };

    function calculateTextMetrics(ctx, title, author, availableWidth, availableHeight, scaleFactor, fontStack, layoutType, depth = 0) {
        if (depth >= CONFIG.maxRecursionDepth) return createFallbackMetrics(title, scaleFactor);

        const isCJK = /[\u4e00-\u9fa5]/.test(title);
        const isVertical = layoutType === 'vertical';
        const isHorizontal = layoutType === 'horizontal';
        const isFramed = layoutType === 'framed';
        const isMinimal = layoutType === 'minimal-top' || layoutType === 'minimal-bottom';
        const isLongText = isCJK ? title.length > 8 : title.length > 15;
        
        let baseSize;
        const baseW = availableWidth / scaleFactor;
        const baseH = availableHeight / scaleFactor;
        
        let lineHeightRatio = CONFIG.lineHeightRatio;
        let gapRatio = CONFIG.titleAuthorGapRatio;
        let authorSizeRatio = 0.42;
        
        if (isHorizontal) {
            if (isCJK) {
                baseSize = Math.min(26, (baseH / 3.0));
            } else {
                baseSize = Math.min(22, (baseH / 2.8));
            }
            baseSize = Math.min(baseSize, baseW / (isLongText ? 10 : 5));
            lineHeightRatio = 1.15;
            gapRatio = 0.3;
            authorSizeRatio = 0.48;
            
        } else if (isFramed) {
            if (isCJK) {
                baseSize = Math.min(28, (baseH / 2.8));
            } else {
                baseSize = Math.min(24, (baseH / 2.5));
            }
            baseSize = Math.min(baseSize, baseW / (isLongText ? 8 : 4.5));
            lineHeightRatio = 1.15;
            gapRatio = 0.3;
            authorSizeRatio = 0.48;
            
        } else if (isMinimal) {
            if (isCJK) {
                baseSize = Math.min(28, (baseH / 2.6));
            } else {
                baseSize = Math.min(24, (baseH / 2.4));
            }
            baseSize = Math.min(baseSize, baseW / (isLongText ? 8 : 4.5));
            lineHeightRatio = 1.25;
            gapRatio = 0.4;
            authorSizeRatio = 0.45;
            
        } else if (layoutType === 'typographic') {
            baseSize = isCJK ? Math.min(28, baseW / 6) : Math.min(24, baseW / 8);
            lineHeightRatio = 1.1;
            gapRatio = 0.35;
            
        } else if (isVertical) {
            const totalChars = title.length + (author ? author.length : 0) + 2;
            baseSize = Math.min(36, (baseH / totalChars) / 1.2);
            baseSize = Math.min(baseSize, baseW * 0.9);
            
        } else if (isLongText) {
            baseSize = isCJK ? Math.min(13, baseW / 12) : Math.min(11, baseW / 14);
        } else {
            if (isCJK) {
                baseSize = title.length <= 4 ? Math.min(22, baseW / 5) : 
                           title.length <= 8 ? Math.min(16, baseW / 8) : Math.min(12, baseW / 12);
            } else {
                baseSize = title.length <= 10 ? Math.min(18, baseW / 10) : Math.min(13, baseW / 14);
            }
        }

        const dynamicMaxFontSize = Math.max(CONFIG.maxFontSize, Math.floor(availableHeight / 2.5));
        const titleSize = Math.max(CONFIG.minFontSize, Math.min(dynamicMaxFontSize, Math.floor(baseSize * scaleFactor)));
        
        const authorSize = Math.max(9, Math.floor(titleSize * authorSizeRatio));
        const lineHeight = titleSize * lineHeightRatio;
        const gap = titleSize * gapRatio;
        
        ctx.font = `700 ${titleSize}px ${fontStack}`;
        const maxLines = isLongText ? 3 : 2;
        const titleLines = balancedWrap(title, availableWidth * 0.92, maxLines, ctx, isCJK);
        
        const titleHeight = titleLines.length * lineHeight;
        const totalHeight = titleHeight + gap + authorSize;
        
        if (totalHeight > availableHeight && titleSize > CONFIG.minFontSize + 2) {
            if ((isHorizontal || isFramed || isMinimal) && depth === 0) {
                const scale = (availableHeight * 0.96) / totalHeight;
                const adjustedSize = Math.max(CONFIG.minFontSize, Math.floor(titleSize * scale));
                return {
                    titleSize: adjustedSize,
                    authorSize: Math.max(9, Math.floor(adjustedSize * authorSizeRatio)),
                    lineHeight: adjustedSize * lineHeightRatio,
                    gap: adjustedSize * gapRatio,
                    titleLines,
                    titleHeight: titleLines.length * adjustedSize * lineHeightRatio,
                    totalHeight: titleLines.length * adjustedSize * lineHeightRatio + adjustedSize * gapRatio + Math.floor(adjustedSize * authorSizeRatio),
                    scaleFactor,
                    isOverflow: false
                };
            }
            return calculateTextMetrics(ctx, title, author, availableWidth, availableHeight * 0.92, scaleFactor, fontStack, layoutType, depth + 1);
        }
        
        return { titleSize, authorSize, lineHeight, gap, titleLines, titleHeight, totalHeight, scaleFactor, isOverflow: totalHeight > availableHeight };
    }

    function createFallbackMetrics(title, scaleFactor) {
        return { titleSize: CONFIG.minFontSize, authorSize: 8, lineHeight: CONFIG.minFontSize * 1.2, 
                gap: 4, titleLines: [title.substring(0,8)+'...'], titleHeight: CONFIG.minFontSize * 1.2,
                totalHeight: CONFIG.minFontSize * 2, scaleFactor, isOverflow: true };
    }

    function balancedWrap(text, maxWidth, maxLines, ctx, isCJK) {
        if (isCJK) {
            const chars = text.split('');
            const lines = [];
            let currentLine = '';
            
            for (let i = 0; i < chars.length && lines.length < maxLines - 1; i++) {
                const test = currentLine + chars[i];
                if (ctx.measureText(test).width > maxWidth && currentLine.length > 0) {
                    lines.push(currentLine);
                    currentLine = chars[i];
                } else {
                    currentLine = test;
                }
            }
            if (currentLine) lines.push(currentLine);
            
            if (lines.length >= 2 && lines[lines.length-1].length < lines[lines.length-2].length * 0.4) {
                const prev = lines[lines.length-2];
                const last = lines[lines.length-1];
                const borrow = Math.floor((prev.length - last.length) / 2);
                if (borrow > 0) {
                    lines[lines.length-1] = prev.slice(-borrow) + last;
                    lines[lines.length-2] = prev.slice(0, -borrow);
                }
            }
            return lines;
        } else {
            const words = text.split(' ');
            const lines = [];
            let currentLine = '';
            
            for (let word of words) {
                const test = currentLine ? currentLine + ' ' + word : word;
                if (ctx.measureText(test).width > maxWidth && currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                    if (lines.length >= maxLines - 1) break;
                } else {
                    currentLine = test;
                }
            }
            if (currentLine && lines.length < maxLines) lines.push(currentLine);
            
            if (lines.length === 2 && lines[1].length < lines[0].length * 0.3) {
                const words0 = lines[0].split(' ');
                if (words0.length > 1) {
                    lines[1] = words0.pop() + ' ' + lines[1];
                    lines[0] = words0.join(' ');
                }
            }
            return lines;
        }
    }

    function drawTextBlock(ctx, title, author, areaX, areaY, areaW, areaH, scaleFactor, color, fontStack, layoutType, align) {
        ctx.save();
        const metrics = calculateTextMetrics(ctx, title, author, areaW, areaH, scaleFactor, fontStack, layoutType);
        
        const startY = areaY + (areaH - metrics.totalHeight) / 2 + metrics.titleSize * 0.85;
        const padding = Math.max(8 * scaleFactor, areaW * 0.03);
        
        let startX;
        switch(align) {
            case 'left': startX = areaX + padding; ctx.textAlign = 'left'; break;
            case 'right': startX = areaX + areaW - padding; ctx.textAlign = 'right'; break;
            default: startX = areaX + areaW / 2; ctx.textAlign = 'center';
        }
        
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = color;
        ctx.font = `700 ${metrics.titleSize}px ${fontStack}`;
        metrics.titleLines.forEach((line, i) => ctx.fillText(line, startX, startY + i * metrics.lineHeight));
        
        ctx.font = `400 ${metrics.authorSize}px ${fontStack}`;
        ctx.globalAlpha = 0.75;
        ctx.fillText(author, startX, startY + metrics.titleHeight + metrics.gap);
        ctx.restore();
    }

    function drawVerticalText(ctx, title, author, areaX, areaY, areaW, areaH, scaleFactor, color, fontStack) {
        ctx.save();
    
        const padding = Math.max(16, 18 * scaleFactor);
        const gap = Math.max(40, 60 * scaleFactor);
        const availableH = areaH - padding * 2;
        
        const totalChars = title.length + (author ? author.length : 0);
        const idealSpacing = (availableH - gap) / totalChars;
        
        const maxFontSizeByHeight = availableH / 4;
        const maxFontSizeByWidth = areaW * 0.65;
        const minFontSize = 12 * scaleFactor;

        const absoluteMaxFontSize = 24 * scaleFactor;
        
        let fontSize = Math.min(idealSpacing / 1.1, maxFontSizeByHeight, maxFontSizeByWidth);
        fontSize = Math.max(fontSize, minFontSize);
        fontSize = Math.min(fontSize, absoluteMaxFontSize);
        
        const spacing = fontSize * 1.15;
        const titleFontSize = fontSize;
        const titleSpacing = spacing;
        const titleTotalH = title.length * titleSpacing;
        const titleStartY = areaY + padding + titleSpacing / 2;
        
        const authorFontSize = Math.max(minFontSize * 0.8, titleFontSize * 0.55);
        const authorSpacing = authorFontSize * 1.1;
        const authorTotalH = author.length * authorSpacing;
        const authorStartY = areaY + areaH - padding - authorTotalH + authorSpacing / 2;
        
        const titleEndY = titleStartY + titleTotalH;
        const minAuthorStartY = titleEndY + gap;
        
        if (author && authorStartY < minAuthorStartY) {
            const overflow = minAuthorStartY - authorStartY;
            const scaleRatio = (availableH - overflow) / availableH;
            fontSize *= scaleRatio;
            
            const adjustedSpacing = fontSize * 1.15;
            const newTitleStartY = areaY + padding + adjustedSpacing / 2;
            
            ctx.font = `700 ${fontSize}px ${fontStack}`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            title.split('').forEach((char, i) => {
                ctx.fillText(char, areaX + areaW / 2, newTitleStartY + i * adjustedSpacing);
            });
            
            const newAuthorFontSize = Math.max(minFontSize * 0.8, fontSize * 0.55);
            const newAuthorSpacing = newAuthorFontSize * 1.1;
            const newAuthorTotalH = author.length * newAuthorSpacing;
            const newAuthorStartY = areaY + areaH - padding - newAuthorTotalH + newAuthorSpacing / 2;
            
            ctx.font = `400 ${newAuthorFontSize}px ${fontStack}`;
            ctx.globalAlpha = 0.8;
            
            author.split('').forEach((char, i) => {
                ctx.fillText(char, areaX + areaW / 2, newAuthorStartY + i * newAuthorSpacing);
            });
        } else {
            ctx.font = `700 ${titleFontSize}px ${fontStack}`;
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            title.split('').forEach((char, i) => {
                ctx.fillText(char, areaX + areaW / 2, titleStartY + i * titleSpacing);
            });
            
            if (author) {
                ctx.font = `400 ${authorFontSize}px ${fontStack}`;
                ctx.globalAlpha = 0.8;
                
                author.split('').forEach((char, i) => {
                    ctx.fillText(char, areaX + areaW / 2, authorStartY + i * authorSpacing);
                });
            }
        }
        
        ctx.restore();
    }

    function drawPatternArea(ctx, x, y, w, h, seed, palette, patternId, density) {
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = palette.pattern;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = palette.accent;
        ctx.fillStyle = palette.accent;
        
        const p = extractParams(seed, 40);
        const pattern = PATTERNS[patternId] || PATTERNS[0];
        const drawer = PatternDrawers[pattern.code];
        if (drawer) drawer(ctx, w, h, p, density);
        ctx.restore();
    }

    const LayoutImplementations = {
        horizontal(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const patternH = Math.floor(h * 0.65);
            drawPatternArea(ctx, 0, 0, w, patternH, seed, palette, patternId, density);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, patternH, w, h - patternH);
            drawTextBlock(ctx, title, author, 0, patternH, w, h - patternH, scaleFactor, palette.text, fontStack, 'horizontal', 'center');
        },
        
        golden(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const patternW = Math.floor(w * 0.618);
            drawPatternArea(ctx, 0, 0, patternW, h, seed, palette, patternId, density);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(patternW, 0, w - patternW, h);
            drawTextBlock(ctx, title, author, patternW, 0, w - patternW, h, scaleFactor, palette.text, fontStack, 'golden', 'center');
        },
        
        floating(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            const cardH = Math.min(Math.floor(h * 0.32), Math.floor(140 * scaleFactor));
            const cardY = h - cardH - Math.floor(24 * scaleFactor);
            const padding = Math.floor(20 * scaleFactor);
            const r = Math.floor(6 * scaleFactor);
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.96;
            
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(padding, cardY, w - padding * 2, cardH, r);
                ctx.fill();
            } else {
                ctx.fillRect(padding, cardY, w - padding * 2, cardH);
            }
            ctx.globalAlpha = 1;
            
            ctx.save();
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(padding, cardY, w - padding * 2, cardH, r);
                ctx.clip();
            }
            drawTextBlock(ctx, title, author, padding, cardY, w - padding * 2, cardH, scaleFactor, palette.text, fontStack, 'floating', 'center');
            ctx.restore();
        },
        
        framed(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, w, h);
            
            const margin = Math.max(12, 14 * scaleFactor);
            const contentW = w - margin * 2;
            const contentH = h - margin * 2;
            
            const patternH = Math.floor(contentH * 0.62);
            drawPatternArea(ctx, margin, margin, contentW, patternH, seed, palette, patternId, density);
            
            const textY = margin + patternH;
            const textH = contentH - patternH;
            
            drawTextBlock(ctx, title, author, margin, textY, contentW, textH, scaleFactor, palette.text, fontStack, 'framed', 'center');
        },
        
        fullbleed(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            
            const gradTop = ctx.createLinearGradient(0, 0, 0, h * 0.25);
            gradTop.addColorStop(0, 'rgba(0,0,0,0.20)');
            gradTop.addColorStop(1, 'rgba(0,0,0,0)');
            
            const gradBottom = ctx.createLinearGradient(0, h * 0.75, 0, h);
            gradBottom.addColorStop(0, 'rgba(0,0,0,0)');
            gradBottom.addColorStop(1, 'rgba(0,0,0,0.20)');
            
            ctx.fillStyle = gradTop;
            ctx.fillRect(0, 0, w, h * 0.25);
            ctx.fillStyle = gradBottom;
            ctx.fillRect(0, h * 0.75, w, h * 0.25);
            
            const isCJK = /[\u4e00-\u9fa5]/.test(title);
            const baseW = w / scaleFactor;
            
            const baseSize = isCJK 
                ? Math.min(28, baseW / 6) 
                : Math.min(24, baseW / 8);
            
            const titleSize = Math.floor(baseSize * scaleFactor);
            const authorSize = Math.max(8, Math.floor(titleSize * 0.42));
            const lineHeight = titleSize * 1.1;
            const gap = titleSize * 0.35;
            
            ctx.fillStyle = palette.textBg;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.font = `700 ${titleSize}px ${fontStack}`;
            const maxWidth = w * 0.88;
            const lines = [];
            
            if (isCJK) {
                const chars = title.split('');
                let line = '';
                for (let char of chars) {
                    const test = line + char;
                    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
                        lines.push(line);
                        line = char;
                        if (lines.length >= 2) break;
                    } else {
                        line = test;
                    }
                }
                if (line && lines.length < 2) lines.push(line);
                
                if (lines.length === 2 && lines[1].length < lines[0].length * 0.4) {
                    const borrow = Math.floor((lines[0].length - lines[1].length) / 2);
                    if (borrow > 0) {
                        lines[1] = lines[0].slice(-borrow) + lines[1];
                        lines[0] = lines[0].slice(0, -borrow);
                    }
                }
            } else {
                const words = title.split(' ');
                let line = '';
                for (let word of words) {
                    const test = line ? line + ' ' + word : word;
                    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
                        lines.push(line);
                        line = word;
                        if (lines.length >= 2) break;
                    } else {
                        line = test;
                    }
                }
                if (line && lines.length < 2) lines.push(line);
            }
            
            const paddingTop = Math.max(48, 52 * scaleFactor);
            const titleStartY = paddingTop + titleSize * 0.5;
            
            lines.forEach((l, i) => {
                ctx.fillText(l, w / 2, titleStartY + i * lineHeight);
            });
            
            ctx.font = `400 ${authorSize}px ${fontStack}`;
            ctx.globalAlpha = 0.9;
            const paddingBottom = Math.max(48, 52 * scaleFactor);
            const authorY = h - paddingBottom - authorSize * 0.3;
            ctx.fillText(author, w / 2, authorY);
            ctx.globalAlpha = 1;
        },
        
        centered(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            const cardW = Math.min(w * 0.8, Math.floor(220 * scaleFactor));
            const cardH = Math.min(h * 0.35, Math.floor(140 * scaleFactor));
            const cardX = (w - cardW) / 2;
            const cardY = (h - cardH) / 2;
            const r = Math.floor(6 * scaleFactor);
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.96;
            
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(cardX, cardY, cardW, cardH, r);
                ctx.fill();
            } else {
                ctx.fillRect(cardX, cardY, cardW, cardH);
            }
            ctx.globalAlpha = 1;
            
            ctx.save();
            if (ctx.roundRect) {
                ctx.beginPath();
                ctx.roundRect(cardX, cardY, cardW, cardH, r);
                ctx.clip();
            }
            drawTextBlock(ctx, title, author, cardX, cardY, cardW, cardH, scaleFactor, palette.text, fontStack, 'centered', 'center');
            ctx.restore();
        },
        
        circle(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            
            const cx = w / 2, cy = h / 2;
            const radius = Math.min(w, h) * 0.38;
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.95;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.clip();
            drawTextBlock(ctx, title, author, cx - radius, cy - radius, radius * 2, radius * 2, scaleFactor, palette.text, fontStack, 'circle', 'center');
            ctx.restore();
            
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = Math.max(1, scaleFactor);
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 4 * scaleFactor, 0, Math.PI * 2);
            ctx.stroke();
        },
        
        header(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const headerH = Math.floor(h * 0.28);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, w, headerH);
            drawTextBlock(ctx, title, author, 0, 0, w, headerH, scaleFactor, palette.text, fontStack, 'header', 'center');
            drawPatternArea(ctx, 0, headerH, w, h - headerH, seed, palette, patternId, density);
        },
        
        footer(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const footerH = Math.floor(h * 0.28);
            drawPatternArea(ctx, 0, 0, w, h - footerH, seed, palette, patternId, density);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, h - footerH, w, footerH);
            drawTextBlock(ctx, title, author, 0, h - footerH, w, footerH, scaleFactor, palette.text, fontStack, 'footer', 'center');
        },
        
        editorial(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            const textW = Math.min(Math.floor(w * 0.55), Math.floor(170 * scaleFactor));
            const textX = Math.floor(20 * scaleFactor);
            const textH = Math.min(Math.floor(h * 0.5), Math.floor(180 * scaleFactor));
            const textY = (h - textH) / 2;
            
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(textX, textY, textW, textH);
            
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = Math.max(2, Math.floor(3 * scaleFactor));
            ctx.beginPath();
            ctx.moveTo(textX + textW + Math.floor(6 * scaleFactor), textY);
            ctx.lineTo(textX + textW + Math.floor(6 * scaleFactor), textY + textH);
            ctx.stroke();
            
            drawTextBlock(ctx, title, author, textX, textY, textW, textH, scaleFactor, palette.text, fontStack, 'editorial', 'left');
        },
        
        'editorial-right'(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            const textW = Math.min(Math.floor(w * 0.55), Math.floor(170 * scaleFactor));
            const textX = w - textW - Math.floor(20 * scaleFactor);
            const textH = Math.min(Math.floor(h * 0.5), Math.floor(180 * scaleFactor));
            const textY = (h - textH) / 2;
            
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(textX, textY, textW, textH);
            
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = Math.max(2, Math.floor(3 * scaleFactor));
            ctx.beginPath();
            ctx.moveTo(textX - Math.floor(6 * scaleFactor), textY);
            ctx.lineTo(textX - Math.floor(6 * scaleFactor), textY + textH);
            ctx.stroke();
            
            drawTextBlock(ctx, title, author, textX, textY, textW, textH, scaleFactor, palette.text, fontStack, 'editorial-right', 'right');
        },
        
        typographic(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(0, 0, w, h);
            drawTextBlock(ctx, title, author, 0, 0, w, h, scaleFactor, palette.textBg, fontStack, 'typographic', 'center');
        },
        
        'minimal-top'(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const splitY = Math.floor(h * 0.5);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, w, splitY);
            drawTextBlock(ctx, title, author, 0, 0, w, splitY, scaleFactor, palette.text, fontStack, 'minimal-top', 'center');
            drawPatternArea(ctx, 0, splitY, w, h - splitY, seed, palette, patternId, density);
        },
        
        'minimal-bottom'(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const splitY = Math.floor(h * 0.5);
            drawPatternArea(ctx, 0, 0, w, splitY, seed, palette, patternId, density);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, splitY, w, h - splitY);
            drawTextBlock(ctx, title, author, 0, splitY, w, h - splitY, scaleFactor, palette.text, fontStack, 'minimal-bottom', 'center');
        },
        
        vertical(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            const margin = Math.floor(w * 0.2);
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.95;
            ctx.fillRect(0, 0, margin, h);
            ctx.globalAlpha = 1;
            
            drawVerticalText(ctx, title, author, 0, 0, margin, h, scaleFactor, palette.text, fontStack);
        },
        
        asymmetric(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const splitX = Math.floor(w * 0.42);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, splitX, h);
            drawPatternArea(ctx, splitX, 0, w - splitX, h, seed, palette, patternId, density);
            drawTextBlock(ctx, title, author, 0, 0, splitX, h, scaleFactor, palette.text, fontStack, 'asymmetric', 'left');
        },
        
        'asymmetric-right'(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const splitX = Math.floor(w * 0.58);
            drawPatternArea(ctx, 0, 0, splitX, h, seed, palette, patternId, density);
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(splitX, 0, w - splitX, h);
            drawTextBlock(ctx, title, author, splitX, 0, w - splitX, h, scaleFactor, palette.text, fontStack, 'asymmetric-right', 'right');
        },
        
        diagonal(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.98;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(w * 0.6, 0);
            ctx.lineTo(0, h * 0.6);
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
            
            drawTextBlock(ctx, title, author, 0, 0, w * 0.5, h * 0.5, scaleFactor, palette.text, fontStack, 'diagonal', 'left');
        },
        
        modular(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const mod = Math.floor(30 * scaleFactor);
            const cols = Math.floor(w / mod);
            const rows = Math.floor(h / mod);
            
            ctx.fillStyle = palette.bg;
            ctx.fillRect(0, 0, w, h);
            
            const patternBlocks = Math.floor((cols * rows * 0.4) * density);
            const p = extractParams(seed, 40);
            
            for (let i = 0; i < patternBlocks; i++) {
                const col = Math.floor(p[i % 40] * cols);
                const row = Math.floor(p[(i + 10) % 40] * rows);
                const x = col * mod;
                const y = row * mod;
                
                ctx.fillStyle = palette.pattern;
                ctx.globalAlpha = 0.6;
                ctx.fillRect(x + 2, y + 2, mod - 4, mod - 4);
            }
            
            const textW = mod * 3;
            const textH = mod * 4;
            const textX = mod;
            const textY = mod * 2;
            
            const safeTextW = Math.min(textW, w - textX - mod);
            const safeTextH = Math.min(textH, h - textY - mod);
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.98;
            ctx.fillRect(textX, textY, safeTextW, safeTextH);
            ctx.globalAlpha = 1;
            
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = Math.max(2, scaleFactor);
            ctx.strokeRect(textX, textY, safeTextW, safeTextH);
            
            drawTextBlock(ctx, title, author, textX, textY, safeTextW, safeTextH, scaleFactor, palette.text, fontStack, 'modular', 'center');
        },

        bookmark(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            drawPatternArea(ctx, 0, 0, w, h, seed, palette, patternId, density);
            
            const tagW = Math.min(Math.floor(w * 0.35), Math.floor(140 * scaleFactor));
            const tagH = Math.floor(h * 0.55);
            const tagX = Math.floor(w * 0.15);
            const r = Math.floor(4 * scaleFactor);
            const holeY = tagH - 15 * scaleFactor;
            const holeR = 3 * scaleFactor;
            
            ctx.fillStyle = palette.textBg;
            ctx.globalAlpha = 0.98;
            
            ctx.beginPath();
            ctx.roundRect(tagX, 0, tagW, tagH, [0, 0, r, r]);
            ctx.arc(tagX + tagW/2, holeY, holeR, 0, Math.PI * 2, true);
            ctx.fill('evenodd');
            ctx.globalAlpha = 1;
            
            drawTextBlock(ctx, title, author, tagX, 0, tagW, tagH - 25 * scaleFactor, scaleFactor, palette.text, fontStack, 'bookmark', 'center');
        },

        lshape(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            const spineW = Math.floor(w * 0.12);
            const footerH = Math.floor(h * 0.28);
            
            drawPatternArea(ctx, spineW, 0, w - spineW, h - footerH, seed, palette, patternId, density);
            
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, spineW, h);
            ctx.fillRect(0, h - footerH, w, footerH);
            
            const textX = spineW;
            const availableW = w - spineW;
            const availableH = footerH;
            
            let titleSize = Math.min(availableH * 0.38, availableW * 0.12, 22 * scaleFactor) * 0.9;
            let authorSize = Math.max(10 * scaleFactor, titleSize * 0.45);
            
            ctx.font = `700 ${titleSize}px ${fontStack}`;
            let metrics = ctx.measureText(title);
            while (metrics.width > availableW * 0.98 && titleSize > 10 * scaleFactor) {
                titleSize *= 0.95;
                authorSize = titleSize * 0.45;
                ctx.font = `700 ${titleSize}px ${fontStack}`;
                metrics = ctx.measureText(title);
            }
            
            const gap = titleSize * 1.5;
            const totalH = titleSize + gap + authorSize;
            const startY = (h - footerH) + (availableH - totalH) / 2 + titleSize * 1;
            
            ctx.fillStyle = palette.text;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
            
            ctx.font = `700 ${titleSize}px ${fontStack}`;
            ctx.fillText(title, textX, startY);
            
            ctx.font = `400 ${authorSize}px ${fontStack}`;
            ctx.globalAlpha = 0.75;
            ctx.fillText(author, textX, startY + gap);
            ctx.globalAlpha = 1;
        },

        porthole(ctx, w, h, title, author, scaleFactor, seed, palette, patternId, density, fontStack) {
            ctx.fillStyle = palette.textBg;
            ctx.fillRect(0, 0, w, h);
            
            const cx = w / 2;
            const cy = h / 2;
            const r = Math.min(w, h) * 0.38;
            
            const textAreaH = (h - r * 2) / 2;
            const padding = Math.max(20, 24 * scaleFactor);
            
            drawTextBlock(ctx, title, '', 0, 0, w, textAreaH + padding, scaleFactor, palette.text, fontStack, 'porthole', 'center');
            drawTextBlock(ctx, '', author, 0, h - textAreaH - padding, w, textAreaH + padding, scaleFactor, palette.text, fontStack, 'porthole', 'center');
            
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            
            drawPatternArea(ctx, cx - r, cy - r, r * 2, r * 2, seed, palette, patternId, density);
            
            ctx.strokeStyle = palette.accent;
            ctx.lineWidth = Math.max(2, scaleFactor);
            ctx.globalAlpha = 0.6;
            ctx.stroke();
            
            ctx.globalAlpha = 0.2;
            ctx.lineWidth = 8 * scaleFactor;
            ctx.stroke();
            
            ctx.restore();
        },
    };

    function generate(options, format = 'canvas', patternOnly = false) {
        if (options.baseWidth && options.baseHeight) {
            CONFIG.baseWidth = options.baseWidth;
            CONFIG.baseHeight = options.baseHeight;
        }
        
        const config = {
            title: options.title || 'Untitled',
            author: options.author || 'Unknown',
            scaleFactor: options.scaleFactor || 1.0,
            layout: options.layout || 'horizontal',
            pattern: options.pattern !== undefined ? options.pattern : -1,
            paletteMode: options.paletteMode || 'auto',
            seed: options.seed !== undefined ? options.seed : null,
            density: options.density || 1.0,
            fontStack: options.fontStack || 'sans-serif',
            hashMode: options.hashMode || false
        };

        const baseW = CONFIG.baseWidth;
        const baseH = CONFIG.baseHeight;
        const width = Math.floor(baseW * config.scaleFactor);
        const height = Math.floor(baseH * config.scaleFactor);
        
        let baseSeed;
        if (config.hashMode) {
            baseSeed = djb2(config.title + '|' + config.author);
        } else {
            baseSeed = config.seed !== null ? parseInt(config.seed) : djb2(config.title + config.author + Date.now());
        }
        
        const patternId = config.pattern >= 0 ? config.pattern : (baseSeed % PATTERNS.length);
        const palette = generatePalette(baseSeed, config.paletteMode);

        if (format === 'svg') {
            const renderer = new SVGRenderer(width, height);
            const drawer = LayoutImplementations[config.layout];
            
            if (drawer) {
                if (patternOnly) {
                    drawPatternArea(renderer, 0, 0, width, height, baseSeed, palette, patternId, config.density);
                } else {
                    drawer(renderer, width, height, config.title, config.author, config.scaleFactor, baseSeed, palette, patternId, config.density, config.fontStack);
                }
            }
            
            return renderer.getSVG();
        } else {
            const canvas = document.createElement('canvas');
            const dpr = Math.min(window.devicePixelRatio || 2, 3);
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';

            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);

            if (patternOnly) {
                drawPatternArea(ctx, 0, 0, width, height, baseSeed, palette, patternId, config.density);
            } else {
                const drawer = LayoutImplementations[config.layout];
                if (drawer) {
                    drawer(ctx, width, height, config.title, config.author, config.scaleFactor, baseSeed, palette, patternId, config.density, config.fontStack);
                }
            }

            canvas.dataset.seed = baseSeed;
            canvas.dataset.layout = config.layout;
            canvas.dataset.pattern = PATTERNS[patternId]?.code || 'unknown';
            canvas.dataset.palette = palette.strategy;
            canvas.dataset.scale = config.scaleFactor;
            canvas.dataset.width = width;
            canvas.dataset.height = height;

            return canvas;
        }
    }

    function getLayouts(lang = 'zh-CN') {
        return LAYOUTS.map(l => ({ id: l.id, name: l.name[lang] || l.name['en'], align: l.align }));
    }

    function getPatterns(lang = 'zh-CN') {
        return PATTERNS.map((p, id) => ({ id, code: p.code, name: p.name[lang] || p.name['en'] }));
    }

    function getDimensionPresets() {
        return Object.entries(DIMENSION_PRESETS).map(([key, val]) => ({
            key,
            name: val.name,
            width: val.width,
            height: val.height,
            ratio: val.ratio
        }));
    }

    function setDimensions(width, height) {
        CONFIG.baseWidth = width;
        CONFIG.baseHeight = height;
    }

    function getText(key, lang = 'zh-CN') {
        return I18N[lang]?.[key] || I18N['en']?.[key] || key;
    }

    function randomText(type) {
        const data = {
            titles: ['三体', 'The Great Gatsby', '百年孤独', 'Design Patterns', '漫长的告别', 'Clean Code', '1984', 'Dune', '围城', 'Neuromancer', '人类简史', 'Snow Crash', '红楼梦', '挪威的森林', '白夜行'],
            authors: ['刘慈欣', 'Fitzgerald', '马尔克斯', 'GoF', '钱德勒', 'Martin', 'Orwell', 'Herbert', '钱钟书', 'Gibson', 'Harari', 'Stephenson', '曹雪芹', '村上春树', '东野圭吾']
        };
        const key = type === 'title' ? 'titles' : type === 'author' ? 'authors' : type;
        const pool = data[key];
        if (!pool || !pool.length) return type === 'title' ? 'Untitled' : 'Unknown';
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function randomFromPool(fontPool) {
        const fonts = fontPool.split(/[,，\n]/).map(f => f.trim()).filter(f => f);
        return fonts.length ? fonts[Math.floor(Math.random() * fonts.length)] : 'sans-serif';
    }

    return {
        generate, getLayouts, getPatterns, getDimensionPresets, setDimensions, getText,
        randomText, randomFromPool, CONFIG, version: '9.0',
        generatePatternOnly: (opts, format = 'canvas') => generate(opts, format, true),
        generateSVG: (opts) => generate(opts, 'svg', false),
        generateSVGPattern: (opts) => generate(opts, 'svg', true)
    };
})();

/**
 * CoverLabUI.js - 界面控制层 v9.0
 * 支持位图/矢量/并排三种视图模式，修复z-index层级
 */
const CoverLabUI = {
    currentScale: 1.0,
    currentLang: localStorage.getItem('coverStudio_lang') || 'zh-CN',
    currentTheme: localStorage.getItem('coverStudio_theme') || 'dark',
    hashMode: false,
    activeDrag: null,
    currentSeed: null,
    isMaximized: false,
    preMaximizeState: null,
    canvasOffset: { x: 0, y: 0 },
    isCanvasDragging: false,
    lastMousePos: { x: 0, y: 0 },
    svgOffset: { x: 0, y: 0 },
    isSVGDragging: false,
    lastSVGMousePos: { x: 0, y: 0 },
    viewMode: 'canvas', // canvas | svg | both
    
    init() {
        this.applyStoredSettings();
        this.initPanel('controlPanel', 'controlHeader');
        this.initPanel('previewPanel', 'previewHeader');
        this.initPanel('batchPanel', 'batchHeader');
        this.initResizeHandles();
        this.initCanvasDrag();
        this.renderControls();
        this.bindEvents();
        this.updateLangIndicator();
        this.updatePreview();
        this.generateBatch();
    },

    initPanel(panelId, headerId) {
        const panel = document.getElementById(panelId);
        const header = document.getElementById(headerId);
        
        header.addEventListener('mousedown', (e) => {
            if (this.isMaximized && panelId === 'previewPanel') return;
            if (e.target.closest('.icon-btn') || e.target.closest('.view-toggle')) return;
            this.activeDrag = {
                panel: panel,
                startX: e.clientX,
                startY: e.clientY,
                initialX: panel.offsetLeft,
                initialY: panel.offsetTop
            };
            panel.classList.add('dragging');
            e.preventDefault();
        });
    },

    initResizeHandles() {
        document.querySelectorAll('.resize-handle').forEach(handle => {
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                if (this.isMaximized) return;
                
                const panel = handle.closest('.floating-panel');
                const direction = handle.dataset.direction;
                const startX = e.clientX, startY = e.clientY;
                const startW = panel.offsetWidth, startH = panel.offsetHeight;
                const startL = panel.offsetLeft, startT = panel.offsetTop;

                const onMove = (e) => {
                    e.preventDefault();
                    const dx = e.clientX - startX, dy = e.clientY - startY;
                    
                    if (direction.includes('e')) panel.style.width = Math.max(280, startW + dx) + 'px';
                    if (direction.includes('s')) panel.style.height = Math.max(200, startH + dy) + 'px';
                    if (direction.includes('w')) {
                        const newW = Math.max(280, startW - dx);
                        panel.style.width = newW + 'px';
                        panel.style.left = (startL + startW - newW) + 'px';
                    }
                    if (direction.includes('n')) {
                        const newH = Math.max(200, startH - dy);
                        panel.style.height = newH + 'px';
                        panel.style.top = (startT + startH - newH) + 'px';
                    }
                };
                
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        });
    },

    initCanvasDrag() {
        const viewport = document.getElementById('canvasViewport');
        const mover = document.getElementById('canvasMover');
        
        // 位图拖拽（原有逻辑）
        viewport.addEventListener('mousedown', (e) => {
            if (e.target.closest('.icon-btn')) return;
            this.isCanvasDragging = true;
            this.lastMousePos = { x: e.clientX, y: e.clientY };
            viewport.style.cursor = 'grabbing';
            e.preventDefault();
        });
        
        // 新增：矢量拖拽
        const svgViewport = document.getElementById('svgViewport');
        if (svgViewport) {
            svgViewport.addEventListener('mousedown', (e) => {
                if (e.target.closest('button')) return; // 避免拦截按钮
                this.isSVGDragging = true;
                this.lastSVGMousePos = { x: e.clientX, y: e.clientY };
                svgViewport.style.cursor = 'grabbing';
                e.preventDefault();
            });
        }
        
        // 统一处理移动
        document.addEventListener('mousemove', (e) => {
            if (this.isCanvasDragging) {
                const dx = e.clientX - this.lastMousePos.x;
                const dy = e.clientY - this.lastMousePos.y;
                this.lastMousePos = { x: e.clientX, y: e.clientY };
                this.canvasOffset.x += dx;
                this.canvasOffset.y += dy;
                mover.style.transform = `translate(${this.canvasOffset.x}px, ${this.canvasOffset.y}px)`;
            }
            
            if (this.isSVGDragging) {
                const dx = e.clientX - this.lastSVGMousePos.x;
                const dy = e.clientY - this.lastSVGMousePos.y;
                this.lastSVGMousePos = { x: e.clientX, y: e.clientY };
                this.svgOffset.x += dx;
                this.svgOffset.y += dy;
                const svg = document.getElementById('svgViewport')?.querySelector('svg');
                if (svg) svg.style.transform = `translate(${this.svgOffset.x}px, ${this.svgOffset.y}px)`;
            }
        });
        
        // 统一处理释放
        document.addEventListener('mouseup', () => {
            if (this.isCanvasDragging) {
                this.isCanvasDragging = false;
                viewport.style.cursor = 'grab';
            }
            if (this.isSVGDragging) {
                this.isSVGDragging = false;
                if (svgViewport) svgViewport.style.cursor = 'grab';
            }
        });
    },

    setViewMode(mode) {
        this.viewMode = mode;
        
        // 更新按钮状态
        document.querySelectorAll('.view-btn').forEach(btn => btn.classList.remove('active'));
        const btnMap = {
            'canvas': 'viewCanvas',
            'svg': 'viewSVG', 
            'both': 'viewBoth'
        };
        const btnId = btnMap[mode];
        if (btnId) {
            const btn = document.getElementById(btnId);
            if (btn) btn.classList.add('active');
        }
                
        const canvasViewport = document.getElementById('canvasViewport');
        const svgViewport = document.getElementById('svgViewport');
        const previewContent = document.getElementById('previewContent');
        
        switch(mode) {
            case 'canvas':
                canvasViewport.classList.remove('hidden');
                svgViewport.classList.remove('active');
                previewContent.classList.remove('side-by-side');
                break;
            case 'svg':
                canvasViewport.classList.add('hidden');
                svgViewport.classList.add('active');
                previewContent.classList.remove('side-by-side');
                this.updateSVGPreview();
                break;
            case 'both':
                canvasViewport.classList.remove('hidden');
                svgViewport.classList.add('active');
                previewContent.classList.add('side-by-side');
                this.updateSVGPreview();
                break;
        }
        
        this.showHint(`视图模式: ${mode === 'canvas' ? '位图' : mode === 'svg' ? '矢量' : '并排'}`);
    },

    updateSVGPreview() {
        const svgViewport = document.getElementById('svgViewport');
        const config = this.getConfig();
        const svgString = CoverCore.generateSVG(config);
        
        svgViewport.innerHTML = svgString;
        const svg = svgViewport.querySelector('svg');
        if (svg) {
            // 关键：计算与 Canvas 完全相同的显示尺寸
            const width = Math.floor(CoverCore.CONFIG.baseWidth * config.scaleFactor);
            const height = Math.floor(CoverCore.CONFIG.baseHeight * config.scaleFactor);
            
            svg.style.width = width + 'px';
            svg.style.height = height + 'px';
            // 移除之前可能导致缩小的 90% 限制
            svg.style.maxWidth = '100%';
            svg.style.maxHeight = '100%';
            svg.style.boxShadow = '0 25px 80px rgba(0,0,0,0.6)';
        }
    },

    toggleMaximize() {
        const panel = document.getElementById('previewPanel');
        const btn = document.getElementById('maximizeBtn');
        
        if (!this.isMaximized) {
            this.preMaximizeState = {
                left: panel.style.left,
                top: panel.style.top,
                width: panel.style.width,
                height: panel.style.height,
                transform: panel.style.transform
            };
            
            panel.classList.add('maximized');
            // 关键修复：最大化时z-index设为1，确保控制面板(z-index:100)和批量面板(z-index:100)在其之上
            panel.style.zIndex = '1';
            this.isMaximized = true;
            btn.innerHTML = '<svg><use href="#icon-restore"/></svg>';
            btn.title = '还原';
            this.showHint(CoverCore.getText('hint.maximize', this.currentLang));
        } else {
            const state = this.preMaximizeState;
            panel.classList.remove('maximized');
            panel.style.left = state.left;
            panel.style.top = state.top;
            panel.style.width = state.width;
            panel.style.height = state.height;
            panel.style.transform = state.transform;
            panel.style.zIndex = ''; // 恢复默认
            
            this.isMaximized = false;
            btn.innerHTML = '<svg><use href="#icon-maximize"/></svg>';
            btn.title = '最大化';
            this.showHint(CoverCore.getText('hint.restore', this.currentLang));
        }
        
        this.resetCanvasPosition();
    },

    resetCanvasPosition() {
        this.canvasOffset = { x: 0, y: 0 };
        document.getElementById('canvasMover').style.transform = 'translate(0,0)';
        
        // 新增：重置 SVG 位置
        this.svgOffset = { x: 0, y: 0 };
        const svg = document.getElementById('svgViewport')?.querySelector('svg');
        if (svg) svg.style.transform = 'translate(0,0)';
    },

    renderControls() {
        const layoutGrid = document.getElementById('layoutGrid');
        layoutGrid.innerHTML = '';
        CoverCore.getLayouts(this.currentLang).forEach((layout, index) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn' + (index === 0 ? ' active' : '');
            btn.dataset.layout = layout.id;
            btn.innerHTML = `<span class="name">${layout.name}</span>`;
            btn.onclick = () => {
                layoutGrid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.updatePreview();
            };
            layoutGrid.appendChild(btn);
        });

        const patternGrid = document.getElementById('patternGrid');
        patternGrid.innerHTML = '';
        CoverCore.getPatterns(this.currentLang).forEach((pattern, index) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn' + (index === 0 ? ' active' : '');
            btn.dataset.pattern = pattern.id;
            btn.innerHTML = `<span class="name">${pattern.name}</span>`;
            btn.onclick = () => {
                patternGrid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.updatePreview();
            };
            patternGrid.appendChild(btn);
        });
    },

    bindEvents() {
        document.addEventListener('mousemove', (e) => {
            if (!this.activeDrag) return;
            const { panel, startX, startY, initialX, initialY } = this.activeDrag;
            let newX = Math.max(0, Math.min(window.innerWidth - panel.offsetWidth, initialX + (e.clientX - startX)));
            let newY = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight - 20, initialY + (e.clientY - startY)));
            panel.style.left = newX + 'px';
            panel.style.top = newY + 'px';
            panel.style.transform = 'none';
        });

        document.addEventListener('mouseup', () => {
            if (this.activeDrag) {
                this.activeDrag.panel.classList.remove('dragging');
                this.activeDrag = null;
            }
        });

        ['titleInput', 'authorInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', this.debounce(() => this.updatePreview(), 300));
        });
        
        ['paletteMode', 'densitySelect', 'seedInput'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => this.updatePreview());
        });

        ['customWidth', 'customHeight'].forEach(id => {
            document.getElementById(id)?.addEventListener('change', () => this.applyCustomDimension());
        });
    },

    debounce(fn, ms) {
        let timer;
        return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
    },

    setOrientation(orientation) {
        document.getElementById('portraitBtn').classList.toggle('active', orientation === 'portrait');
        document.getElementById('landscapeBtn').classList.toggle('active', orientation === 'landscape');
        
        const preset = document.getElementById('dimensionPreset').value;
        if (preset !== 'custom') {
            const dim = CoverCore.getDimensionPresets().find(d => d.key === preset);
            if (dim) {
                if (orientation === 'landscape') {
                    CoverCore.setDimensions(dim.height, dim.width);
                } else {
                    CoverCore.setDimensions(dim.width || 300, dim.height || 300 * dim.ratio);
                }
                this.updatePreview();
            }
        }
    },

    applyDimensionPreset(key) {
        const customDiv = document.getElementById('customDimensions');
        if (key === 'custom') {
            customDiv.style.display = 'grid';
            return;
        }
        customDiv.style.display = 'none';
        
        const dim = CoverCore.getDimensionPresets().find(d => d.key === key);
        if (!dim) return;
        
        const isLandscape = document.getElementById('landscapeBtn').classList.contains('active');
        
        if (isLandscape) {
            CoverCore.setDimensions(dim.height || 300 * dim.ratio, dim.width || 300);
        } else {
            CoverCore.setDimensions(dim.width || 300, dim.height || 300 * dim.ratio);
        }
        
        this.updatePreview();
    },

    applyCustomDimension() {
        const w = parseInt(document.getElementById('customWidth').value) || 300;
        const h = parseInt(document.getElementById('customHeight').value) || 425;
        CoverCore.setDimensions(w, h);
        this.updatePreview();
    },

    getConfig() {
        const layoutBtn = document.querySelector('#layoutGrid .option-btn.active');
        const patternBtn = document.querySelector('#patternGrid .option-btn.active');
        
        let seed = document.getElementById('seedInput').value || null;
        if (!seed && this.currentSeed !== null && !this.hashMode) {
            seed = this.currentSeed;
        }
        
        return {
            title: document.getElementById('titleInput').value || 'Untitled',
            author: document.getElementById('authorInput').value || 'Unknown',
            scaleFactor: this.currentScale,
            layout: layoutBtn?.dataset.layout || 'horizontal',
            pattern: parseInt(patternBtn?.dataset.pattern || '0'),
            paletteMode: document.getElementById('paletteMode').value,
            seed: seed,
            density: parseFloat(document.getElementById('densitySelect').value),
            fontStack: document.getElementById('fontInput').value || 'sans-serif',
            hashMode: this.hashMode
        };
    },

    updatePreview() {
        const mover = document.getElementById('canvasMover');
        mover.innerHTML = '';
        
        try {
            const config = this.getConfig();
            const canvas = CoverCore.generate(config, 'canvas');
            
            if (!this.hashMode) {
                this.currentSeed = parseInt(canvas.dataset.seed);
            }
            
            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            
            const layoutObj = CoverCore.getLayouts(this.currentLang).find(l => l.id === canvas.dataset.layout);
            const layoutName = layoutObj ? layoutObj.name : canvas.dataset.layout;
            const dim = Math.floor(300 * config.scaleFactor);
            const metaText = `${layoutName} · ${dim}px${config.hashMode ? ' · Hash' : ''}`;

            // 更新标题栏
            const previewMeta = document.getElementById('previewMeta');
            if (previewMeta) previewMeta.textContent = metaText;

            wrapper.appendChild(canvas);
            mover.appendChild(wrapper);
            
            this.resetCanvasPosition();
            
            // 如果当前是SVG或并排模式，同时更新SVG
            if (this.viewMode === 'svg' || this.viewMode === 'both') {
                this.updateSVGPreview();
            }
        } catch (e) {
            console.error('Preview error:', e);
        }
    },

    generateBatch() {
        const grid = document.getElementById('batchGrid');
        grid.innerHTML = '';
        
        const testBooks = [
            {t: '三体', a: '刘慈欣'}, {t: 'The Great Gatsby', a: 'Fitzgerald'},
            {t: '百年孤独', a: '马尔克斯'}, {t: 'Design Patterns', a: 'GoF'},
            {t: '漫长的告别', a: '钱德勒'}, {t: 'Clean Code', a: 'Martin'},
            {t: '1984', a: 'Orwell'}, {t: 'Dune', a: 'Herbert'}
        ];
        
        const fontPool = document.getElementById('fontInput').value;
        const layouts = CoverCore.getLayouts();
        
        const currentBaseW = CoverCore.CONFIG.baseWidth;
        const currentBaseH = CoverCore.CONFIG.baseHeight;
        const currentRatio = currentBaseH / currentBaseW;
        
        const displayWidth = 100;
        const scaleFactor = displayWidth / currentBaseW;
        
        testBooks.forEach((book, i) => {
            setTimeout(() => {
                try {
                    const randomLayout = layouts[Math.floor(Math.random() * layouts.length)].id;
                    const randomPattern = Math.floor(Math.random() * 40);
                    const baseSeed = Date.now() + i * 123;
                    
                    const canvas = CoverCore.generate({
                        title: book.t,
                        author: book.a,
                        scaleFactor: scaleFactor,
                        layout: randomLayout,
                        pattern: randomPattern,
                        paletteMode: 'auto',
                        seed: baseSeed,
                        fontStack: CoverCore.randomFromPool(fontPool)
                    }, 'canvas');
                    
                    const item = document.createElement('div');
                    item.className = 'batch-item';
                    item.style.aspectRatio = `${currentBaseW}/${currentBaseH}`;
                    
                    item.dataset.layout = randomLayout;
                    item.dataset.pattern = randomPattern;
                    item.dataset.paletteMode = 'auto';
                    item.dataset.seed = baseSeed;
                    item.dataset.title = book.t;
                    item.dataset.author = book.a;
                    
                    item.onclick = () => {
                        document.getElementById('hashMode').checked = false;
                        this.hashMode = false;
                        
                        document.getElementById('titleInput').value = item.dataset.title;
                        document.getElementById('authorInput').value = item.dataset.author;
                        document.getElementById('seedInput').value = item.dataset.seed;
                        
                        document.querySelectorAll('#layoutGrid .option-btn').forEach(btn => {
                            btn.classList.toggle('active', btn.dataset.layout === item.dataset.layout);
                        });
                        
                        document.querySelectorAll('#patternGrid .option-btn').forEach(btn => {
                            btn.classList.toggle('active', parseInt(btn.dataset.pattern) === parseInt(item.dataset.pattern));
                        });
                        
                        document.getElementById('paletteMode').value = item.dataset.paletteMode;
                        
                        this.updatePreview();
                        this.showHint(CoverCore.getText('hint.loaded', this.currentLang) + ': ' + item.dataset.title);
                    };
                    
                    item.appendChild(canvas);
                    grid.appendChild(item);
                } catch (e) {
                    console.error('Batch error:', e);
                }
            }, i * 60);
        });
    },

    setScale(val) {
        this.currentScale = parseFloat(val);
        document.getElementById('scaleValue').textContent = val + 'x';
        this.updatePreview();
    },

    applyStoredSettings() {
        document.body.setAttribute('data-theme', this.currentTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerHTML = `<use href="#icon-${this.currentTheme === 'dark' ? 'sun' : 'moon'}"/>`;
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = CoverCore.getText(el.dataset.i18n, this.currentLang);
        });
    },

    toggleLanguage() {
        this.currentLang = this.currentLang === 'zh-CN' ? 'en' : 'zh-CN';
        localStorage.setItem('coverStudio_lang', this.currentLang);
        this.updateLangIndicator();
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = CoverCore.getText(el.dataset.i18n, this.currentLang);
        });
        this.renderControls();
        this.updatePreview();
    },

    toggleTheme() {
        this.currentTheme = this.currentTheme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('coverStudio_theme', this.currentTheme);
        document.body.setAttribute('data-theme', this.currentTheme);
        const icon = document.getElementById('themeIcon');
        if (icon) icon.innerHTML = `<use href="#icon-${this.currentTheme === 'dark' ? 'sun' : 'moon'}"/>`;
    },

    updateLangIndicator() {
        const ind = document.getElementById('langIndicator');
        if (ind) ind.textContent = this.currentLang === 'zh-CN' ? '中' : 'EN';
    },

    toggleHashMode() {
        this.hashMode = document.getElementById('hashMode').checked;
        this.updatePreview();
        if (this.hashMode) this.showHint(CoverCore.getText('hint.hashMode', this.currentLang));
    },

    resetLayout() {
        const cp = document.getElementById('controlPanel');
        const pp = document.getElementById('previewPanel');
        const bp = document.getElementById('batchPanel');
        
        cp.style.left = '24px'; cp.style.top = '24px';
        cp.style.width = '380px'; cp.style.height = 'calc(100vh - 48px)';
        
        pp.style.left = '50%'; pp.style.top = '50%';
        pp.style.transform = 'translate(-50%, -50%)';
        pp.style.width = '800px'; pp.style.height = '720px';
        pp.classList.remove('maximized');
        pp.style.zIndex = ''; // 恢复默认
        this.isMaximized = false;
        document.getElementById('maximizeBtn').innerHTML = '<svg><use href="#icon-maximize"/></svg>';
        
        bp.style.right = '24px'; 
        bp.style.top = '50%';
        bp.style.transform = 'translateY(-50%)';
        bp.style.left = 'auto'; 
        bp.style.bottom = 'auto';
        bp.style.width = '380px'; 
        bp.style.height = '720px';
        
        this.resetCanvasPosition();
        this.showHint(CoverCore.getText('hint.reset', this.currentLang));
    },

    downloadCover() {
        const config = this.getConfig();
        const canvas = CoverCore.generate(config, 'canvas');
        
        const link = document.createElement('a');
        link.download = `cover_${config.title.replace(/\s+/g, '_')}_${config.scaleFactor}x.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        this.showHint('封面已下载 (PNG)');
    },

    downloadPattern() {
        const config = this.getConfig();
        const canvas = CoverCore.generatePatternOnly(config, 'canvas');
        
        const link = document.createElement('a');
        link.download = `pattern_${config.pattern}_${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        this.showHint('图案已下载 (PNG)');
    },

    downloadSVG() {
        const config = this.getConfig();
        const svgString = CoverCore.generateSVG(config);
        
        const blob = new Blob([svgString], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `cover_${config.title.replace(/\s+/g, '_')}_${config.scaleFactor}x.svg`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        this.showHint('矢量封面已下载 (SVG)');
    },

    downloadSVGPattern() {
        const config = this.getConfig();
        const svgString = CoverCore.generateSVGPattern(config);
        
        const blob = new Blob([svgString], {type: 'image/svg+xml'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `pattern_${config.pattern}_${Date.now()}.svg`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        this.showHint('矢量图案已下载 (SVG)');
    },

    randomizeAll() {
        this.currentSeed = null;
        document.getElementById('seedInput').value = '';
        this.randomizeText();
        this.randomizeLayout();
        this.randomizePattern();
        this.randomizePalette();
        this.updatePreview();
        this.showHint(CoverCore.getText('hint.updated', this.currentLang));
    },

    randomizeText() {
        document.getElementById('titleInput').value = CoverCore.randomText('title');
        document.getElementById('authorInput').value = CoverCore.randomText('author');
        if (!document.getElementById('seedInput').value) {
            this.currentSeed = null;
        }
        this.updatePreview();
    },

    randomizeSingle(type) {
        document.getElementById(type + 'Input').value = CoverCore.randomText(type);
        this.updatePreview();
    },

    randomizeFont() {
        const fontPool = document.getElementById('fontInput').value;
        const selected = CoverCore.randomFromPool(fontPool);
        const config = this.getConfig();
        config.fontStack = selected;
        const canvas = CoverCore.generate(config, 'canvas');
        const mover = document.getElementById('canvasMover');
        mover.innerHTML = '';
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        
        const info = document.createElement('div');
        info.className = 'canvas-info';
        info.textContent = CoverCore.getText(canvas.dataset.layout, this.currentLang) + ' · ' + selected.split(',')[0];
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(info);
        mover.appendChild(wrapper);
        
        this.showHint(CoverCore.getText('hint.fontRandom', this.currentLang) + ': ' + selected.split(',')[0]);
    },

    randomizeLayout() {
        const layouts = document.querySelectorAll('#layoutGrid .option-btn');
        const r = Math.floor(Math.random() * layouts.length);
        layouts.forEach((b, i) => b.classList.toggle('active', i === r));
        this.updatePreview();
    },

    randomizePattern() {
        const patterns = document.querySelectorAll('#patternGrid .option-btn');
        const r = Math.floor(Math.random() * patterns.length);
        patterns.forEach((b, i) => b.classList.toggle('active', i === r));
        this.updatePreview();
    },

    randomizePalette() {
        const modes = ['auto', 'monochrome', 'complementary', 'analogous', 'triadic', 'split'];
        document.getElementById('paletteMode').value = modes[Math.floor(Math.random() * modes.length)];
        this.updatePreview();
    },

    showHint(text) {
        const bar = document.getElementById('hintBar');
        bar.textContent = text;
        bar.classList.add('show');
        setTimeout(() => bar.classList.remove('show'), 2000);
    }
};

const app = CoverLabUI;
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
