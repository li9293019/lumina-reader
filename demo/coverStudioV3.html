    selectedPatterns: new Set(),

    // 切换图案预览面板
    togglePatternPreviewPanel() {
        const panel = document.getElementById('patternPreviewPanel');
        if (panel.style.display === 'none' || panel.style.display === '') {
            // 强制重置所有定位属性，避免继承其他面板的样式
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
            panel.style.transform = 'none';
            panel.style.display = 'flex';
            panel.style.opacity = '0';
            
            // 先设置一个默认居中位置（使用left/top，不用transform）
            const defaultWidth = 720;
            const defaultHeight = 650;
            panel.style.width = defaultWidth + 'px';
            panel.style.height = defaultHeight + 'px';
            panel.style.left = (window.innerWidth - defaultWidth) / 2 + 'px';
            panel.style.top = (window.innerHeight - defaultHeight) / 2 + 'px';
            
            // 初始化拖拽头部
            this.initPanel('patternPreviewPanel', 'patternPreviewHeader');
            
            // 生成内容（如果是首次打开）
            if (!panel.dataset.initialized) {
                this.generatePatternPreviews();
                panel.dataset.initialized = 'true';
            }
            
            // 延迟初始化resize和显示
            setTimeout(() => {
                this.initResizeHandlesForPanel(panel);
                panel.style.opacity = '1';
            }, 50);
        } else {
            this.closePatternPreviewPanel();
        }
    },

    initResizeHandlesForPanel(panel) {
        panel.querySelectorAll('.resize-handle').forEach(handle => {
            // 避免重复绑定
            const newHandle = handle.cloneNode(true);
            handle.parentNode.replaceChild(newHandle, handle);
            
            newHandle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                const direction = newHandle.dataset.direction;
                const startX = e.clientX;
                const startY = e.clientY;
                const startW = panel.offsetWidth;
                const startH = panel.offsetHeight;
                
                // 获取当前实际位置（考虑可能存在的transform）
                const rect = panel.getBoundingClientRect();
                const computedStyle = window.getComputedStyle(panel);
                let startL = rect.left;
                let startT = rect.top;
                
                // 如果有transform，将其转换为left/top
                if (computedStyle.transform && computedStyle.transform !== 'none') {
                    panel.style.transform = 'none';
                    panel.style.left = startL + 'px';
                    panel.style.top = startT + 'px';
                }

                const onMove = (e) => {
                    e.preventDefault();
                    const dx = e.clientX - startX;
                    const dy = e.clientY - startY;
                    
                    if (direction.includes('e')) {
                        panel.style.width = Math.max(320, startW + dx) + 'px';
                    }
                    if (direction.includes('s')) {
                        panel.style.height = Math.max(400, startH + dy) + 'px';
                    }
                    if (direction.includes('w')) {
                        const newW = Math.max(320, startW - dx);
                        panel.style.width = newW + 'px';
                        panel.style.left = (startL + startW - newW) + 'px';
                    }
                    if (direction.includes('n')) {
                        const newH = Math.max(400, startH - dy);
                        panel.style.height = newH + 'px';
                        panel.style.top = (startT + startH - newH) + 'px';
                    }
                };
                
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
        });
    },

    // 关闭图案预览面板
    closePatternPreviewPanel() {
        document.getElementById('patternPreviewPanel').style.display = 'none';
        // 清空选中状态
        this.selectedPatterns.clear();
        this.updatePatternSelectCount();
    },

    // 生成所有图案预览
    generatePatternPreviews() {
        const container = document.getElementById('patternPreviewContent');
        container.innerHTML = '';
        
        const patterns = CoverCore.getPatterns(this.currentLang);
        
        patterns.forEach((pattern, index) => {
            const card = document.createElement('div');
            card.className = 'pattern-card';
            card.dataset.patternId = pattern.id;
            card.dataset.patternCode = pattern.code;
            card.dataset.patternName = pattern.name;
            
            // 创建Canvas直接绘制图案，不使用版式
            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 300; // 1:1正方形
            canvas.style.width = '100%';
            canvas.style.height = 'auto';
            canvas.style.aspectRatio = '1/1';
            canvas.style.borderRadius = '4px';
            canvas.style.background = '#0a0a0f'; // 深色背景
            
            // 延迟绘制避免阻塞
            setTimeout(() => {
                try {
                    const ctx = canvas.getContext('2d');
                    const w = 300, h = 300;
                    
                    // 使用 CoverCore 暴露的方法
                    const seed = 12345 + index;
                    const palette = CoverCore.generatePalette(seed, 'auto');
                    
                    // 绘制背景
                    ctx.fillStyle = palette.bg;
                    ctx.fillRect(0, 0, w, h);
                    
                    // 设置图案绘制颜色
                    ctx.strokeStyle = palette.accent;
                    ctx.fillStyle = palette.accent;
                    
                    // 获取参数并绘制纯图案 - 使用 CoverCore 暴露的方法
                    const p = CoverCore.extractParams(seed, 40);
                    const drawer = CoverCore.PatternDrawers[pattern.code];
                    if (drawer) {
                        ctx.save();
                        drawer(ctx, w, h, p, 0.8); // 0.8密度
                        ctx.restore();
                    }
                    
                } catch (e) {
                    console.error('Pattern draw error:', e);
                }
            }, index * 20);
            
            card.appendChild(canvas);
            
            // 悬浮名称（绝对定位）
            const nameLabel = document.createElement('div');
            nameLabel.className = 'pattern-name-overlay';
            nameLabel.textContent = pattern.name;
            card.appendChild(nameLabel);
            
            // 点击事件
            card.addEventListener('click', (e) => {
                this.togglePatternSelection(card, pattern, e);
            });
            
            container.appendChild(card);
        });
    },

    // 切换图案选中状态
    togglePatternSelection(cardElement, pattern, event) {
        const isSelected = cardElement.classList.contains('selected');
        
        if (isSelected) {
            // 已选中 -> 取消选中
            cardElement.classList.remove('selected');
            // 从 Set 中删除（通过 code 匹配）
            for (const item of this.selectedPatterns) {
                if (item.code === pattern.code) {
                    this.selectedPatterns.delete(item);
                    break;
                }
            }
        } else {
            // 未选中 -> 选中（添加到 Set）
            cardElement.classList.add('selected');
            this.selectedPatterns.add({
                id: pattern.id,
                code: pattern.code,
                name: pattern.name
            });
        }
        
        this.updatePatternSelectCount();
    },

    // 更新选中计数和复制按钮状态
    updatePatternSelectCount() {
        const countSpan = document.getElementById('patternSelectCount');
        const copyBtn = document.getElementById('copyPatternsBtn');
        const clearBtn = document.getElementById('clearPatternsBtn');
        
        if (this.selectedPatterns.size > 0) {
            countSpan.textContent = `(${this.selectedPatterns.size})`;
            copyBtn.style.opacity = '1';
            copyBtn.style.pointerEvents = 'auto';
            clearBtn.style.opacity = '1';        // 启用清除按钮
            clearBtn.style.pointerEvents = 'auto';
        } else {
            countSpan.textContent = '';
            copyBtn.style.opacity = '0.5';
            copyBtn.style.pointerEvents = 'none';
            clearBtn.style.opacity = '0.5';      // 禁用清除按钮
            clearBtn.style.pointerEvents = 'none';
        }
    },

    // 取消所有选择
    clearPatternSelection() {
        if (this.selectedPatterns.size === 0) return;
        
        // 清空 Set
        this.selectedPatterns.clear();
        
        // 移除所有卡片的选中样式
        document.querySelectorAll('#patternPreviewContent .pattern-card.selected').forEach(card => {
            card.classList.remove('selected');
        });
        
        // 更新按钮状态
        this.updatePatternSelectCount();
        
        this.showHint(CoverCore.getText('hint.selectionCleared', this.currentLang));
    },

    // 复制选中的图案名称
    copySelectedPatterns() {
        if (this.selectedPatterns.size === 0) {
            this.showHint(CoverCore.getText('hint.selectFirst', this.currentLang));
            return;
        }
        
        // 按 id 排序后获取名称
        const sorted = Array.from(this.selectedPatterns).sort((a, b) => a.id - b.id);
        const names = sorted.map(p => p.name).join(', ');
        
        // 复制到剪贴板...
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(names).then(() => {
                this.showHint(`${CoverCore.getText('hint.copied', this.currentLang)} ${this.selectedPatterns.size} ${CoverCore.getText('hint.copiedPatternCount', this.currentLang)}`);
            }).catch(() => this.fallbackCopyText(names));
        } else {
            this.fallbackCopyText(names);
        }
    },

    // 降级复制方案
    fallbackCopyText(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed; opacity:0; pointer-events:none;';
        document.body.appendChild(textarea);
        textarea.select();
        
        try {
            const successful = document.execCommand('copy');
            if (successful) {
                this.showHint(`${CoverCore.getText('hint.copied', this.currentLang)} ${this.selectedPatterns.size} ${CoverCore.getText('hint.copiedPatternCount', this.currentLang)}`);
            } else {
                throw new Error('execCommand failed');
            }
        } catch (err) {
            console.error('Copy failed:', err);
            this.showHint(CoverCore.getText('hint.copyFailed', this.currentLang));
        }
        
        document.body.removeChild(textarea);
    },
};

const app = CoverLabUI;
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
