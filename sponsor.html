<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Support Lumina Reader</title>
    <style>
        :root {
            --bg-primary: #f5f0e8;
            --bg-secondary: #ffffff;
            --bg-gradient-start: #f5f0e8;
            --bg-gradient-end: #e8e0d5;
            --text-primary: #2c2424;
            --text-secondary: #6b6b6b;
            --text-tertiary: #999999;
            --accent: #8B7B64;
            --accent-light: #A6957D;
            --border: rgba(139, 123, 100, 0.15);
            --shadow: rgba(44, 36, 36, 0.08);
            --card-bg: #ffffff;
            --wechat: #07C160;
            --alipay: #1677FF;
            --heart: #E74C3C;
            --glow: rgba(244, 156, 12, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1814;
                --bg-secondary: #2a2520;
                --bg-gradient-start: #2a2520;
                --bg-gradient-end: #1a1814;
                --text-primary: #e8e0d5;
                --text-secondary: #b0b0b0;
                --text-tertiary: #666666;
                --accent: #A6957D;
                --accent-light: #C4B5A0;
                --border: rgba(166, 149, 125, 0.2);
                --shadow: rgba(0, 0, 0, 0.3);
                --card-bg: #2a2520;
                --wechat: #4CAF50;
                --alipay: #64B5F6;
                --heart: #E57373;
                --glow: rgba(244, 156, 12, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'Noto Sans TC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
            background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--text-primary);
            line-height: 1.7;
        }

        .container {
            width: 100%;
            max-width: 360px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 顶部品牌区域 */
        .brand-section {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            border-radius: 18px;
            box-shadow: 0 4px 20px var(--shadow), 0 0 40px var(--glow);
        }

        .logo svg {
            width: 100%;
            height: 100%;
            border-radius: 18px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* 三栏文案卡片 */
        .quotes-card {
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .quote-section {
            padding: 20px;
            position: relative;
        }

        .quote-section:not(:last-child) {
            border-bottom: 1px solid var(--border);
        }

        .quote-section p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .quote-highlight {
            color: var(--accent);
            font-weight: 500;
        }

        /* 二维码区域 */
        .qr-section {
            display: flex;
            gap: 16px;
            margin-bottom: 28px;
        }

        .qr-card {
            flex: 1;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
            transition: transform 0.2s ease;
        }

        .qr-card:active {
            transform: scale(0.98);
        }

        .qr-card.wechat {
            border-top: 3px solid var(--wechat);
        }

        .qr-card.alipay {
            border-top: 3px solid var(--alipay);
        }

        .qr-wrapper {
            width: 100%;
            aspect-ratio: 1;
            margin: 0 auto 12px;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
        }

        .qr-wrapper svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .qr-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* 感谢区域 */
        .thanks-section {
            text-align: center;
            padding: 8px 0 20px;
        }

        .heart-icon {
            width: 28px;
            height: 28px;
            margin-bottom: 10px;
            fill: var(--heart);
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .thanks-text {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* 底部语言切换 */
        .lang-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .lang-item {
            position: relative;
            cursor: pointer;
        }

        .lang-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s ease;
        }

        .lang-item:hover .lang-dot {
            transform: scale(1.3);
            background: var(--accent-light);
        }

        .lang-item.active .lang-dot {
            background: var(--accent);
            width: 24px;
            border-radius: 4px;
        }

        .lang-tooltip {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-primary);
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            pointer-events: none;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .lang-tooltip::after {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-bottom-color: var(--text-primary);
        }

        .lang-item:hover .lang-tooltip {
            opacity: 1;
            visibility: visible;
            top: 24px;
        }

        /* 响应式 */
        @media (max-height: 700px) {
            .brand-section { margin-bottom: 20px; }
            .logo { width: 60px; height: 60px; }
            h1 { font-size: 20px; }
            .quotes-card { margin-bottom: 20px; }
            .quote-section { padding: 16px; }
            .quote-section p { font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 品牌区域 -->
        <div class="brand-section">
            <div class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#2C2424" d="M0 4a4 4 0 0 1 4-4h16a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4H4a4 4 0 0 1-4-4z"/>
                    <path fill="#8B7B64" d="M2.754 6.145s6.623-.586 9.229 4.137v9.52s-3.358-4.394-9.229-4.394z"/>
                    <path fill="#736353" d="M21.212 6.145s-6.624-.586-9.229 4.137v9.52s3.357-4.394 9.229-4.394z"/>
                    <path fill="#F49C0C" d="M16.036 7.253a2.665 2.665 0 1 1 5.33 0 2.665 2.665 0 0 1-5.33 0z"/>
                </svg>
            </div>
            <h1 data-i18n="title">流萤阅读器</h1>
        </div>

        <!-- 两栏文案卡片 -->
        <div class="quotes-card">
            <div class="quote-section">
                <p data-i18n="quote1">阅读应当是沉浸的，如同潜入深水；而非嘈杂的，如同在广场上被推销。纸页之间的私密光晕，只为相信文字应当被温柔对待的人。</p>
            </div>
            <div class="quote-section">
                <p data-i18n="quote2">流萤因你而继续发光。你的支持将帮助它保持纯粹与自由，持续更新，永不添加广告。</p>
            </div>
        </div>

        <!-- 二维码区域 -->
        <div class="qr-section">
            <div class="qr-card wechat">
                <div class="qr-wrapper" id="wechat-qr"></div>
                <div class="qr-label" data-i18n="wechat">微信支付</div>
            </div>
            <div class="qr-card alipay">
                <div class="qr-wrapper" id="alipay-qr"></div>
                <div class="qr-label" data-i18n="alipay">支付宝</div>
            </div>
        </div>

        <!-- 感谢区域 -->
        <div class="thanks-section">
            <svg class="heart-icon" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            <p class="thanks-text" data-i18n="thanks">感谢你的支持</p>
        </div>

        <!-- 语言切换 -->
        <div class="lang-footer">
            <div class="lang-item" data-lang="zh" onclick="setLang('zh')">
                <div class="lang-tooltip">简体中文</div>
                <div class="lang-dot"></div>
            </div>
            <div class="lang-item" data-lang="zh-TW" onclick="setLang('zh-TW')">
                <div class="lang-tooltip">繁體中文</div>
                <div class="lang-dot"></div>
            </div>
            <div class="lang-item" data-lang="ja" onclick="setLang('ja')">
                <div class="lang-tooltip">日本語</div>
                <div class="lang-dot"></div>
            </div>
            <div class="lang-item" data-lang="ko" onclick="setLang('ko')">
                <div class="lang-tooltip">한국어</div>
                <div class="lang-dot"></div>
            </div>
            <div class="lang-item" data-lang="en" onclick="setLang('en')">
                <div class="lang-tooltip">English</div>
                <div class="lang-dot"></div>
            </div>
        </div>
    </div>

    <script>
        /* QRCode 库代码 */
        (function(global){'use strict';function QR8bitByte(data){this.mode=4;this.data=data}QR8bitByte.prototype.getLength=function(){return this.data.length};QR8bitByte.prototype.write=function(buffer){for(var i=0;i<this.data.length;i++){buffer.put(this.data.charCodeAt(i),8)}};function QRCodeModel(typeNumber,errorCorrectionLevel){this.typeNumber=typeNumber;this.errorCorrectionLevel=errorCorrectionLevel;this.modules=null;this.moduleCount=0;this.dataCache=null;this.dataList=[]}QRCodeModel.prototype.addData=function(data){this.dataList.push(new QR8bitByte(data));this.dataCache=null};QRCodeModel.prototype.isDark=function(row,col){if(row<0||this.moduleCount<=row||col<0||this.moduleCount<=col){throw new Error(row+','+col)}return this.modules[row][col]};QRCodeModel.prototype.getModuleCount=function(){return this.moduleCount};QRCodeModel.prototype.make=function(){this.makeImpl(false,this.getBestMaskPattern())};QRCodeModel.prototype.getBestMaskPattern=function(){var minLostPoint=0;var pattern=0;for(var i=0;i<8;i++){this.makeImpl(true,i);var lostPoint=QRUtil.getLostPoint(this);if(i==0||minLostPoint>lostPoint){minLostPoint=lostPoint;pattern=i}}return pattern};QRCodeModel.prototype.makeImpl=function(test,maskPattern){this.moduleCount=this.typeNumber*4+17;this.modules=new Array(this.moduleCount);for(var row=0;row<this.moduleCount;row++){this.modules[row]=new Array(this.moduleCount);for(var col=0;col<this.moduleCount;col++){this.modules[row][col]=null}}this.setupPositionProbePattern(0,0);this.setupPositionProbePattern(this.moduleCount-7,0);this.setupPositionProbePattern(0,this.moduleCount-7);this.setupPositionAdjustPattern();this.setupTimingPattern();this.setupTypeInfo(test,maskPattern);if(this.typeNumber>=7){this.setupTypeNumber(test)}if(this.dataCache==null){this.dataCache=QRCodeModel.createData(this.typeNumber,this.errorCorrectionLevel,this.dataList)}this.mapData(this.dataCache,maskPattern)};QRCodeModel.prototype.setupPositionProbePattern=function(row,col){for(var r=-1;r<=7;r         // 检测系统语言
        function detectLanguage() {
            const lang = navigator.language || navigator.languages?.[0] || 'zh';
            const langLower = lang.toLowerCase();
            
            if (langLower.startsWith('zh-hant') || langLower === 'zh-tw' || langLower === 'zh-hk') {
                return 'zh-TW';
            }
            if (langLower.startsWith('zh')) {
                return 'zh';
            }
            if (langLower.startsWith('ja')) {
                return 'ja';
            }
            if (langLower.startsWith('ko')) {
                return 'ko';
            }
            return 'en';
        }

        // 当前语言
        let currentLang = detectLanguage();

        // 设置语言
        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // 更新圆点状态
            document.querySelectorAll('.lang-item').forEach(item => {
                item.classList.toggle('active', item.dataset.lang === lang);
            });
            
            // 更新文本
            const texts = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
            
            // 保存到 localStorage
            localStorage.setItem('sponsorLang', lang);
        }

        // 初始化语言
        function initLang() {
            // 优先使用 localStorage 保存的语言，否则使用浏览器语言
            const savedLang = localStorage.getItem('sponsorLang');
            if (savedLang && i18n[savedLang]) {
                currentLang = savedLang;
            } else {
                // 首次访问，使用检测到的语言并保存
                currentLang = detectLanguage();
                localStorage.setItem('sponsorLang', currentLang);
            }
            setLang(currentLang);
        }
